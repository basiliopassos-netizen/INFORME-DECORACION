<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Pro v2.3 - Edición Rápida</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #edeff2; margin: 0; overflow-x: hidden; width: 100%; }

        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: var(--primary); color: #bdc3c7; font-weight: bold; font-size: 12px; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: #34495e; }

        .seccion { padding: 12px; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; }

        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 8px; }
        label { font-size: 10px; font-weight: bold; color: var(--primary); margin-bottom: 3px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; height: 45px; }

        .contadores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wrapper-btn { display: flex; flex-direction: column; gap: 5px; }
        
        .btn-principal { border: none; border-radius: 12px; padding: 15px; color: white; cursor: pointer; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .btn-ok { background: var(--success); box-shadow: 0 4px #1e8449; }
        .btn-no-ok { background: var(--danger); box-shadow: 0 4px #b03a2e; }
        .btn-principal span { font-size: 32px; font-weight: bold; }

        /* Botón de edición pequeño */
        .btn-edit { background: #dfe4ea; border: none; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: #2f3542; cursor: pointer; }

        .fila-fallo { display: flex; justify-content: space-between; padding: 8px; background: #fff5f5; border-radius: 8px; margin-top: 5px; border-left: 4px solid var(--danger); font-size: 13px; }

        .btn-reporte { width: 100%; background: #2c3e50; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        #pdf-content { position: absolute; left: -5000px; width: 600px; background: white; padding: 30px; }
    </style>
</head>
<body>

<div id="loading">
    <div style="font-size: 50px;">⏳</div>
    <b id="loading-text">Guardando...</b>
</div>

<div class="tabs">
    <button class="tab-btn active" id="tab-calidad" onclick="verTab('calidad')">CALIDAD</button>
    <button class="tab-btn" id="tab-final" onclick="verTab('final')">FINAL</button>
</div>

<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="procesarDobleFoto(event)">

<div class="seccion">
    <div class="card">
        <div class="grid-datos">
            <div class="campo"><label>Fecha</label><input type="date" id="inp-fecha"></div>
            <div class="campo">
                <label>Turno</label>
                <select id="inp-turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>
            <div class="campo"><label>OF</label><input type="text" id="inp-of"></div>
            <div class="campo"><label>Sustrato</label><input type="text" id="inp-sustrato"></div>
        </div>
    </div>

    <div class="card">
        <div class="contadores">
            <div class="wrapper-btn">
                <button class="btn-principal btn-ok" onclick="sumarUno('ok')"><small>OK</small><span id="txt-ok">0</span></button>
                <button class="btn-edit" onclick="editarNum('ok')">✏️ EDITAR OK</button>
            </div>
            <div class="wrapper-btn">
                <button class="btn-principal btn-no-ok" onclick="abrirModalFallos()"><small>NO OK</small><span id="txt-nook">0</span></button>
                <button class="btn-edit" onclick="editarNum('nook')">✏️ EDITAR NO OK</button>
            </div>
        </div>
        <div id="lista-fallos-viva" style="margin-top:10px"></div>
    </div>

    <button class="btn-reporte" onclick="generarReporteTotal()">🚀 FINALIZAR Y ENVIAR</button>
    <button onclick="resetDatos()" style="width:100%; background:none; border:none; color:#95a5a6; padding:15px; text-decoration:underline; font-size:12px;">Limpiar datos / Nueva Orden</button>
</div>

<div id="modal-fallos" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; width:100%; max-width:400px; padding:20px; border-radius:15px;">
        <h3>¿Qué defecto es?</h3>
        <div id="opciones-fallos"></div>
        <button onclick="cerrarModal()" style="width:100%; margin-top:15px; padding:10px; border:none; background:#eee; border-radius:10px;">Cerrar</button>
    </div>
</div>

<div id="pdf-content">
    <h1>REPORTE DE CALIDAD</h1>
    <p><b>Fecha:</b> <span id="pdf-fecha"></span> | <b>Hora:</b> <span id="pdf-hora"></span> | <b>Turno:</b> <span id="pdf-turno"></span></p>
    <p><b>OF:</b> <span id="pdf-of"></span> | <b>Sustrato:</b> <span id="pdf-sustrato"></span></p>
    <hr>
    <h2>RESULTADOS: OK: <span id="pdf-ok"></span> | NO OK: <span id="pdf-nook"></span></h2>
    <div id="pdf-fallos-lista"></div>
    <div id="pdf-fotos-gal" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmEOnt3yEjiBgB-yHWOazs5s0XiYhZi5583_FoI60CZBZP4-B-BbOAJWXWxjMSANKv/exec";
    const defectologia = {
        calidad: ["Bultos", "Malla suelta", "Rota", "Sucia"],
        final: ["Gota Kerajet", "Tono", "Rascada", "Rota", "Manchada"]
    };

    let tabActual = 'calidad';
    let pasoFoto = 0;
    let db = { calidad: { ok: 0, nook: 0, fallos: {}, fotos: [] }, final: { ok: 0, nook: 0, fallos: {}, fotos: [] } };

    function verTab(tab) {
        tabActual = tab;
        document.getElementById('tab-calidad').classList.toggle('active', tab === 'calidad');
        document.getElementById('tab-final').classList.toggle('active', tab === 'final');
        refrescarUI();
    }

    function editarNum(tipo) {
        let val = prompt("Introduce el número correcto:", db[tabActual][tipo]);
        if (val !== null) {
            db[tabActual][tipo] = parseInt(val) || 0;
            refrescarUI();
        }
    }

    function abrirModalFallos() {
        pasoFoto = 0;
        const div = document.getElementById('opciones-fallos');
        div.innerHTML = '';
        defectologia[tabActual].forEach(f => {
            div.innerHTML += `<button onclick="iniciarCaptura('${f}')" style="width:100%; padding:15px; margin-bottom:8px; border:none; background:#f8f9fa; text-align:left; border-left:5px solid var(--danger); font-weight:bold;">${f}</button>`;
        });
        document.getElementById('modal-fallos').style.display = 'flex';
    }

    function iniciarCaptura(m) {
        db[tabActual].fallos[m] = (db[tabActual].fallos[m] || 0) + 1;
        db[tabActual].nook++;
        document.getElementById('opciones-fallos').innerHTML = `<p>1. Foto <b>DEFECTO</b></p><button onclick="lanzarCamara(1)" style="width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:10px;">📸 CÁMARA</button>`;
    }

    function lanzarCamara(p) { pasoFoto = p; document.getElementById('camera-input').click(); }

    function procesarDobleFoto(e) {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            db[tabActual].fotos.push({ src: ev.target.result, tipo: pasoFoto == 1 ? 'DEF' : 'LOT' });
            if (pasoFoto == 1) {
                document.getElementById('opciones-fallos').innerHTML = `<p>2. Foto <b>LOTE / ETIQUETA</b></p><button onclick="lanzarCamara(2)" style="width:100%; padding:20px; background:var(--success); color:white; border:none; border-radius:10px;">📸 CÁMARA</button>`;
            } else {
                cerrarModal(); refrescarUI();
            }
        };
        r.readAsDataURL(f);
    }

    function refrescarUI() {
        const d = db[tabActual];
        document.getElementById('txt-ok').innerText = d.ok;
        document.getElementById('txt-nook').innerText = d.nook;
        const lista = document.getElementById('lista-fallos-viva');
        lista.innerHTML = '';
        for(let f in d.fallos) if(d.fallos[f]>0) lista.innerHTML += `<div class="fila-fallo"><span>${f}</span><b>${d.fallos[f]}</b></div>`;
        localStorage.setItem('QA_V2.3', JSON.stringify(db));
    }

    async function generarReporteTotal() {
        const load = document.getElementById('loading');
        const loadText = document.getElementById('loading-text');
        load.style.display = 'flex';
        
        const d = db[tabActual];
        const ahora = new Date();
        const horaStr = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
        
        // Excel
        loadText.innerText = "Guardando en Excel...";
        let fallosTxt = ""; for(let f in d.fallos) if(d.fallos[f]>0) fallosTxt += `${f}: ${d.fallos[f]} | `;
        
        const payload = {
            fecha: document.getElementById('inp-fecha').value,
            hora: horaStr,
            turno: document.getElementById('inp-turno').value,
            of: document.getElementById('inp-of').value,
            sustrato: document.getElementById('inp-sustrato').value,
            ok: d.ok, nook: d.nook, fallos: fallosTxt
        };

        try { await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }); } catch(e){}

        // PDF
        document.getElementById('pdf-fecha').innerText = payload.fecha;
        document.getElementById('pdf-hora').innerText = payload.hora;
        document.getElementById('pdf-turno').innerText = payload.turno;
        document.getElementById('pdf-of').innerText = payload.of;
        document.getElementById('pdf-sustrato').innerText = payload.sustrato;
        document.getElementById('pdf-ok').innerText = d.ok;
        document.getElementById('pdf-nook').innerText = d.nook;
        const fl = document.getElementById('pdf-fallos-lista'); fl.innerHTML = "";
        for(let f in d.fallos) if(d.fallos[f]>0) fl.innerHTML += `<li>${f}: ${d.fallos[f]}</li>`;
        const fg = document.getElementById('pdf-fotos-gal'); fg.innerHTML = "";
        d.fotos.forEach(f => fg.innerHTML += `<img src="${f.src}" style="width:100%">`);

        setTimeout(() => {
            html2canvas(document.getElementById('pdf-content'), {scale:1.2}).then(canvas => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'pt', 'a4');
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
                
                const pdfBlob = doc.output('blob');
                const fileName = `Reporte_${payload.of}.pdf`;
                const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                
                load.style.display = 'none';

                // INTENTO DE COMPARTIR (Móvil)
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ files: [file], title: 'Reporte Calidad' }).catch(() => doc.save(fileName));
                } else {
                    // DESCARGA AUTOMÁTICA (Plan B)
                    doc.save(fileName);
                    alert("PDF generado. Búscalo en tus descargas y adjúntalo al WhatsApp.");
                }
            });
        }, 1000);
    }

    function sumarUno(t) { db[tabActual][t]++; refrescarUI(); }
    function cerrarModal() { document.getElementById('modal-fallos').style.display = 'none'; }
    function resetDatos() { if(confirm("¿Borrar datos?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const s = localStorage.getItem('QA_V2.3'); if(s) db = JSON.parse(s);
        document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];
        refrescarUI();
    };
</script>
</body>
</html>
