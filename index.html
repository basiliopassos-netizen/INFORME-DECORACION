<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decoline V61 - Nexus Ultra-Com</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0d47a1; --green: #2e7d32; --red: #b71c1c; --orange: #e65100; --gray: #eceff1; --sidebar-w: 75px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: var(--blue); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1001; }
        .side-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 24px; cursor: pointer; padding: 12px; border-radius: 15px; width: 60px; text-align: center; }
        .side-btn.active { color: white; background: rgba(255,255,255,0.2); }
        .side-label { font-size: 8px; display: block; margin-top: 4px; font-weight: bold; text-transform: uppercase; }
        .main { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .sect { display: none; }
        .sect.active { display: block; }
        .kpi-box { background: linear-gradient(135deg, var(--blue), #002171); color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .f-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .f-val { display: block; font-size: 15px; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #cfd8dc; }
        h3 { margin: 0 0 10px 0; color: var(--blue); font-size: 11px; border-left: 4px solid var(--blue); padding-left: 10px; text-transform: uppercase; }
        label { font-weight: bold; font-size: 9px; color: #546e7a; display: block; margin-top: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #b0bec5; border-radius: 10px; font-size: 14px; box-sizing: border-box; text-transform: uppercase; }
        input[type="time"], input[type="date"] { text-transform: none; }
        .grid-sem { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .sem-btn { padding: 12px 5px; border-radius: 15px; border: 2px solid; background: white; font-weight: bold; text-align: center; cursor: pointer; }
        .sem-val { display: block; font-size: 24px; color: #333; }
        .btn-green { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; justify-content:center; align-items:center; }
        .m-content { background:white; width:92%; border-radius:25px; padding:20px; max-height: 85vh; overflow-y: auto; }
        .m-btn { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; width: 100%; margin-bottom: 8px; border-radius: 12px; font-weight: bold; text-align: left; }
        .hist-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; font-size: 11px; align-items: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="side-btn active" onclick="setTab(0, this)">🏠<span class="side-label">DASH</span></button>
    <button class="side-btn" onclick="setTab(5, this)">⚙️<span class="side-label">MAEST</span></button>
    <button class="side-btn" onclick="setTab(1, this)">🔍<span class="side-label">CALID</span></button>
    <button class="side-btn" onclick="setTab(2, this)">📦<span class="side-label">EMBAL</span></button>
    <button class="side-btn" onclick="setTab(3, this)">⚠️<span class="side-label">PARAD</span></button>
    <button class="side-btn" onclick="setTab(4, this)">📝<span class="side-label">HIST</span></button>
</div>

<div class="main">
    <div id="tab0" class="sect active">
        <div class="kpi-box">
            <span style="font-size:10px; text-transform:uppercase;">Predicción Inteligente A-B-C</span>
            <div class="f-grid">
                <div class="f-card"><span>OPTIMISTA (A)</span><span class="f-val" id="f-a">0</span></div>
                <div class="f-card" style="background:rgba(255,255,255,0.2)"><span>REALISTA (B)</span><span class="f-val" id="f-b">0</span></div>
                <div class="f-card"><span>CRÍTICO (C)</span><span class="f-val" id="f-c">0</span></div>
            </div>
        </div>
        <div class="card">
            <h3>Registro del Turno</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Fecha</label><input type="date" id="f-fecha" onchange="sync()"></div>
                <div><label>Orden (OF)</label><input type="text" id="f-of" oninput="sync()"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Código SAP</label><input type="text" id="f-sap" oninput="sync()"></div>
                <div><label>Lote ADN</label><input type="text" id="f-lote" oninput="sync()"></div>
            </div>
            <label>Gráfica / Sustrato</label><input type="text" id="f-graf" oninput="sync()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Turno</label><select id="f-turno" onchange="sync()"><option>MAÑANA</option><option>TARDE</option><option>NOCHE</option></select></div>
                <div><label>Equipo</label><select id="f-equi" onchange="sync()"><option>T1</option><option>T2</option><option>T3</option></select></div>
            </div>
        </div>
    </div>

    <div id="tab5" class="sect">
        <div class="card">
            <h3>Configuración Maestro</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Inicio</label><input type="time" id="cfg-h-ini" value="06:00" onchange="sync()"></div>
                <div><label>Cierre</label><input type="time" id="cfg-h-fin" value="14:15" onchange="sync()"></div>
            </div>
            <label>Cadencia (Seg/Pza)</label><input type="number" step="0.1" id="cfg-seg" value="6.5" onchange="sync()">
            <label>Piezas Iniciales</label><input type="number" id="cfg-pz-ini" oninput="sync()">
        </div>
        <div class="card">
            <h3>Personalización</h3>
            <button class="btn-green" onclick="document.getElementById('m-new-def').style.display='flex'">[+ NUEVO DEFECTO]</button>
            <button class="btn-green" style="background:var(--orange)" onclick="document.getElementById('m-new-par').style.display='flex'">[+ NUEVO MOTIVO PARADA]</button>
            <div id="custom-lists" style="font-size:11px; margin-top:10px;"></div>
        </div>
        <button class="btn-green" style="background:var(--red)" onclick="if(confirm('¿Reiniciar?')){localStorage.clear(); location.reload();}">REINICIAR TURNO</button>
    </div>

    <div id="tab1" class="sect"><div class="card"><h3>Sustrato</h3><div class="grid-sem"><div class="sem-btn">OK<span class="sem-val" id="v-cal-ok">0</span></div><div class="sem-btn" onclick="openModal('R1', 'SUSTRATO')">R1<span class="sem-val" id="v-cal-r1">0</span></div><div class="sem-btn" onclick="openModal('NO OK', 'SUSTRATO')">NO OK<span class="sem-val" id="v-cal-no">0</span></div></div><label>Contador OK</label><input type="number" id="in-cal-ok" oninput="db.cal.ok=parseInt(this.value)||0; sync();"></div></div>
    <div id="tab2" class="sect"><div class="card"><h3>Embalaje</h3><div class="grid-sem"><div class="sem-btn">OK<span class="sem-val" id="v-emb-ok">0</span></div><div class="sem-btn" onclick="openModal('R1', 'EMBALAJE')">R1<span class="sem-val" id="v-emb-r1">0</span></div><div class="sem-btn" onclick="openModal('NO OK', 'EMBALAJE')">NO OK<span class="sem-val" id="v-emb-no">0</span></div></div><label>Contador OK</label><input type="number" id="in-emb-ok" oninput="db.emb.ok=parseInt(this.value)||0; sync();"></div></div>

    <div id="tab3" class="sect">
        <div class="card">
            <h3>Paradas</h3>
            <label>Estación</label><select id="p-est"><option>LGV</option><option>ROBOTIONS</option><option>CEPILLADORA</option><option>CABINA 1</option><option>HORNOS</option><option>ERRECE</option><option>KERAJET</option><option>TRASLOW</option><option>CABINA 2</option><option>EMBALAJE</option></select>
            <label>Motivo Rápido</label><select id="p-quick-obs" onchange="document.getElementById('p-obs').value=this.value.toUpperCase()"><option value="">-- SELECCIONAR --</option></select>
            <div style="display:flex; gap:10px; margin-top:8px;"><input type="time" id="p-h1"><input type="time" id="p-h2"></div>
            <textarea id="p-obs" placeholder="Escriba motivo manual..."></textarea>
            <label>Comentario Extra</label><input type="text" id="p-comment" placeholder="Ej: LADO IZQUIERDO SATURADO">
            <button class="btn-green" onclick="addParada()">Guardar Parada</button>
        </div>
    </div>

    <div id="tab4" class="sect"><div class="card"><div id="h-content"></div></div><button class="btn-green" style="background:var(--blue)" onclick="generarPDF()">DESCARGAR AUDITORÍA V61</button></div>
</div>

<div id="modal"><div class="m-content"><h3 id="m-title">Defecto</h3><div id="m-ops"></div><div id="m-extra" style="display:none; border-top:1px solid #ddd; padding-top:10px;"><div id="m-extra-sust"><label>Lote/Cav/Prensa</label><input type="text" id="m-val-sust" placeholder="12 / 8 / P2"></div><div id="m-extra-emb" style="display:none;"><label>Origen</label><select id="m-val-emb"><option>KERAJET</option><option>CABINA 1</option><option>CABINA 2</option><option>UV</option><option>OTRO</option></select></div><label>Comentario Extra</label><input type="text" id="m-val-comment" placeholder="Nota adicional..."><button class="btn-green" onclick="saveDef()">Confirmar Registro</button></div><button class="btn-green" style="background:#888" onclick="closeM()">Cerrar</button></div></div>

<div id="m-new-def" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;"><div class="m-content"><h3>Nuevo Defecto</h3><label>Nombre</label><input type="text" id="nd-name"><label>Zona</label><select id="nd-zona"><option value="SUSTRATO">Calidad</option><option value="EMBALAJE">Embalaje</option></select><label>Tipo</label><select id="nd-tipo"><option value="R1">R1</option><option value="NO OK">NO OK</option></select><button class="btn-green" onclick="createNewDef()">Guardar</button><button class="btn-green" style="background:#888" onclick="document.getElementById('m-new-def').style.display='none'">Cerrar</button></div></div>

<div id="m-new-par" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;"><div class="m-content"><h3>Nuevo Motivo Rápido</h3><label>Descripción</label><input type="text" id="np-name" placeholder="Ej: LIMPIEZA ASPIRACIÓN"><button class="btn-green" onclick="createNewParadaMotivo()">Guardar</button><button class="btn-green" style="background:#888" onclick="document.getElementById('m-new-par').style.display='none'">Cerrar</button></div></div>

<script>
    var db = JSON.parse(localStorage.getItem('decoline_v61')) || {
        reg: { fecha: new Date().toISOString().split('T')[0], of:'', sap:'', lote:'', graf:'', sust:'', turno:'MAÑANA', equi:'T1' },
        cal: {ok:0, r1:0, no:0, hist:[]}, emb: {ok:0, r1:0, no:0, hist:[]},
        parad: [], cfg: {h_ini:'06:00', h_fin:'14:15', seg:6.5, pz_ini:0}, customDefs: [], customPars: []
    };

    let temp = {};
    const DEFS_BASE = ["ROTA", "BULTOS", "DIMENSIONES", "GOTA", "SUCIA", "MALLA", "OTRO"];

    function setTab(n, btn) {
        document.querySelectorAll('.sect').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.sect')[n].classList.add('active');
        btn.classList.add('active');
        if(n === 3) updateQuickPars();
        if(n === 4) renderHist();
        if(n === 5) renderCustomLists();
    }

    function sync() {
        db.reg.fecha = document.getElementById('f-fecha').value;
        db.reg.of = document.getElementById('f-of').value.toUpperCase();
        db.reg.sap = document.getElementById('f-sap').value.toUpperCase();
        db.reg.lote = document.getElementById('f-lote').value.toUpperCase();
        db.reg.graf = document.getElementById('f-graf').value.toUpperCase();
        db.cfg.h_ini = document.getElementById('cfg-h-ini').value;
        db.cfg.h_fin = document.getElementById('cfg-h-fin').value;
        db.cfg.seg = parseFloat(document.getElementById('cfg-seg').value) || 6.5;
        db.cfg.pz_ini = parseInt(document.getElementById('cfg-pz-ini').value) || 0;
        localStorage.setItem('decoline_v61', JSON.stringify(db));
        updateDash();
    }

    function updateDash() {
        let okTot = (parseInt(db.cal.ok)||0) + (parseInt(db.emb.ok)||0) + db.cfg.pz_ini;
        let noTot = db.cal.no + db.emb.no;
        let mermaP = (okTot > 0) ? (noTot / okTot) : 0;
        let ahora = new Date(), f = db.cfg.h_fin.split(':'), fin = new Date();
        fin.setHours(f[0], f[1], 0); if(fin < ahora) fin.setDate(fin.getDate()+1);
        let segRest = Math.max(0, (fin - ahora) / 1000);
        let pzRest = segRest / db.cfg.seg;
        document.getElementById('f-a').innerText = Math.round(okTot + pzRest);
        document.getElementById('f-b').innerText = Math.round(okTot + (pzRest * (1 - mermaP)));
        document.getElementById('f-c').innerText = Math.round(okTot + (pzRest * (1 - (mermaP + 0.1))));
        document.getElementById('v-cal-ok').innerText = db.cal.ok; document.getElementById('v-cal-r1').innerText = db.cal.r1; document.getElementById('v-cal-no').innerText = db.cal.no;
        document.getElementById('v-emb-ok').innerText = db.emb.ok; document.getElementById('v-emb-r1').innerText = db.emb.r1; document.getElementById('v-emb-no').innerText = db.emb.no;
    }

    function openModal(tipo, zona) {
        temp = { tipo, zona }; document.getElementById('modal').style.display = 'flex';
        let ops = document.getElementById('m-ops'); ops.innerHTML = ''; document.getElementById('m-extra').style.display = 'none';
        let list = [...DEFS_BASE]; db.customDefs.filter(d => d.zona === zona && d.tipo === tipo).forEach(d => list.push(d.name));
        list.forEach(d => {
            let b = document.createElement('button'); b.className = 'm-btn'; b.innerText = d;
            b.onclick = () => { temp.d = d; ops.style.display = 'none'; document.getElementById('m-extra').style.display = 'block'; document.getElementById('m-extra-sust').style.display = (zona === 'SUSTRATO' ? 'block' : 'none'); document.getElementById('m-extra-emb').style.display = (zona === 'EMBALAJE' ? 'block' : 'none'); };
            ops.appendChild(b);
        });
    }

    function saveDef() {
        let t = (temp.zona === 'SUSTRATO' ? db.cal : db.emb); if(temp.tipo === 'R1') t.r1++; else t.no++;
        let traz = (temp.zona === 'SUSTRATO' ? document.getElementById('m-val-sust').value.toUpperCase() : document.getElementById('m-val-emb').value);
        let comm = document.getElementById('m-val-comment').value.toUpperCase();
        t.hist.push({ def: temp.d, tipo: temp.tipo, hora: new Date().toLocaleTimeString().substring(0,5), info: traz + (comm ? " | OBS: "+comm : "") });
        document.getElementById('m-val-sust').value = ''; document.getElementById('m-val-comment').value = ''; sync(); closeM();
    }

    function addParada() {
        let h1 = document.getElementById('p-h1').value, h2 = document.getElementById('p-h2').value; if(!h1 || !h2) return;
        let m = (parseInt(h2.split(':')[0])*60 + parseInt(h2.split(':')[1])) - (parseInt(h1.split(':')[0])*60 + parseInt(h1.split(':')[1]));
        let comm = document.getElementById('p-comment').value.toUpperCase();
        db.parad.push({est: document.getElementById('p-est').value, h1, h2, min: m, obs: document.getElementById('p-obs').value.toUpperCase() + (comm ? " ("+comm+")" : "")});
        document.getElementById('p-obs').value = ''; document.getElementById('p-h1').value = ''; document.getElementById('p-h2').value = ''; document.getElementById('p-comment').value = ''; sync(); alert("Guardado");
    }

    function createNewDef() { let name = document.getElementById('nd-name').value.toUpperCase(); if(!name) return; db.customDefs.push({ name, zona: document.getElementById('nd-zona').value, tipo: document.getElementById('nd-tipo').value }); document.getElementById('nd-name').value = ''; document.getElementById('m-new-def').style.display='none'; sync(); renderCustomLists(); }
    function createNewParadaMotivo() { let name = document.getElementById('np-name').value.toUpperCase(); if(!name) return; db.customPars.push(name); document.getElementById('np-name').value = ''; document.getElementById('m-new-par').style.display='none'; sync(); renderCustomLists(); }
    function updateQuickPars() { let sel = document.getElementById('p-quick-obs'); sel.innerHTML = '<option value="">-- SELECCIONAR --</option>'; db.customPars.forEach(p => { sel.innerHTML += `<option value="${p}">${p}</option>`; }); }

    function renderCustomLists() {
        let h = "<b>BOTONES:</b><br>"; db.customDefs.forEach((d, i) => { h += `${d.name} <button onclick="db.customDefs.splice(${i},1); sync(); renderCustomLists();">X</button> | `; });
        h += "<br><b>PARADAS:</b><br>"; db.customPars.forEach((p, i) => { h += `${p} <button onclick="db.customPars.splice(${i},1); sync(); renderCustomLists();">X</button> | `; });
        document.getElementById('custom-lists').innerHTML = h;
    }

    function renderHist() {
        const gen = (target, title, tipo) => {
            let h = `<div style="background:#ddd; padding:8px; border-radius:8px; margin-bottom:5px;"><b>${title}</b></div>`;
            target.hist.forEach((x, i) => { h += `<div class="hist-row"><span><b>${x.hora}</b> ${x.def} - ${x.info}</span><button style="color:red; border:none; background:none;" onclick="delItem('${tipo}', ${i})">X</button></div>`; });
            return h;
        };
        let p = `<h3>Paradas</h3>`; db.parad.forEach((x, i) => { p += `<div class="hist-row"><span><b>${x.h1}-${x.h2}</b> ${x.est} (${x.min}m): ${x.obs}</span><button style="color:red; border:none; background:none;" onclick="delItem('par', ${i})">X</button></div>`; });
        document.getElementById('h-content').innerHTML = gen(db.cal, 'SUSTRATO', 'cal') + gen(db.emb, 'EMBALAJE', 'emb') + p;
    }

    function delItem(tipo, i) {
        if(tipo === 'cal') { let x=db.cal.hist[i]; if(x.tipo==='R1') db.cal.r1--; else db.cal.no--; db.cal.hist.splice(i,1); }
        else if(tipo === 'emb') { let x=db.emb.hist[i]; if(x.tipo==='R1') db.emb.r1--; else db.emb.no--; db.emb.hist.splice(i,1); }
        else db.parad.splice(i,1);
        sync(); renderHist();
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; document.getElementById('m-ops').style.display = 'block'; }

    async function generarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(13, 71, 161); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255); doc.setFontSize(22); doc.text("AUDITORÍA NEXUS V61", 20, 25);
        doc.setTextColor(0); doc.setFontSize(10);
        doc.text(`OF: ${db.reg.of} | SAP: ${db.reg.sap} | LOTE: ${db.reg.lote}`, 20, 50);
        doc.autoTable({ startY: 60, head: [['ZONA','OK','R1','NO OK']], body: [['SUSTRATO',db.cal.ok,db.cal.r1,db.cal.no],['EMBALAJE',db.emb.ok,db.emb.r1,db.emb.no]], headStyles: {fillColor:[13,71,161]} });
        doc.text("CRONOGRAMA DE PARADAS", 20, doc.lastAutoTable.finalY + 10);
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 15, head: [['ESTACIÓN','MIN','MOTIVO/COMENTARIO']], body: db.parad.map(p => [p.est, p.min, p.obs]), headStyles: {fillColor:[183,28,28]} });
        doc.save(`Auditoria_OF_${db.reg.of}.pdf`);
    }

    window.onload = () => {
        document.getElementById('f-fecha').value = db.reg.fecha;
        setInterval(updateDash, 1000);
        sync();
    };
</script>
</body>
</html>
