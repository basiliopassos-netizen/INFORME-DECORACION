<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD COMMANDER V48</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #38bdf8; --success: #22c55e; --warning: #eab308; --danger: #ef4444; --text: #f3f4f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text); }
        body { margin: 0; background: var(--bg); padding-bottom: 90px; }
        
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); position: sticky; top:0; z-index:100; display: flex; justify-content: space-between; }
        .stat-box { background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; flex: 1; margin: 0 5px; border: 1px solid #334155; }
        .stat-val { display: block; font-size: 18px; font-weight: 900; color: var(--accent); }
        
        .container { padding: 12px; }
        h2 { font-size: 14px; text-transform: uppercase; color: #94a3b8; margin: 15px 0 8px 5px; display: flex; justify-content: space-between; }
        
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #262626; }
        
        /* Contadores en Semáforo */
        .grid-count { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-c { border: none; border-radius: 10px; padding: 15px 5px; font-weight: bold; position: relative; }
        .btn-c b { font-size: 24px; display: block; }
        .edit-pen { position: absolute; top: 4px; right: 4px; font-size: 10px; background: rgba(0,0,0,0.3); padding: 2px; border-radius: 3px; }

        /* Estaciones Parada */
        .estacion-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #262626; }
        .timer-unit { font-family: monospace; font-size: 20px; color: var(--danger); font-weight: bold; }
        
        input, select { background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 8px; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; height: 65px; border-top: 1px solid #333; }
        .nav-item { flex: 1; border: none; background: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: var(--accent); font-weight: bold; }
        
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="stat-box">
        <small>OBJETIVO</small>
        <span class="stat-val">320</span>
    </div>
    <div class="stat-box">
        <small>PREDICCIÓN</small>
        <span class="stat-val" id="h-pred">---</span>
    </div>
    <div class="stat-box">
        <small>ESTADO</small>
        <span class="stat-val" id="h-diff" style="color:white">OK</span>
    </div>
</header>

<div class="container">
    <div id="t-inicio" class="content">
        <div class="card">
            <label>⚙️ CONFIGURACIÓN TURNO</label>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <select id="turno" onchange="g()"><option>Mañana (06-14)</option><option>Tarde (14-22)</option><option>Noche (22-06)</option></select>
                <select id="equipo" onchange="g()"><option>T1</option><option>T2</option><option>T3</option></select>
            </div>
            <input type="text" id="of" placeholder="Nº Orden de Fabricación" oninput="g()">
            <input type="text" id="desc" placeholder="Modelo / Formato" oninput="g()">
        </div>
    </div>

    <div id="t-calidad" class="content hidden">
        <h2>🏺 ZONA CRUDO (Prensas/Esmalte)</h2>
        <div class="card">
            <div class="grid-count">
                <button class="btn-c" style="background:var(--success)" onclick="add('c','ok')"><span class="edit-pen" onclick="ed('c','ok',event)">✏️</span><b id="c-ok">0</b>OK</button>
                <button class="btn-c" style="background:var(--warning); color:black" onclick="add('c','r1')"><span class="edit-pen" onclick="ed('c','r1',event)">✏️</span><b id="c-r1">0</b>R1</button>
                <button class="btn-c" style="background:var(--danger)" onclick="add('c','ko')"><span class="edit-pen" onclick="ed('c','ko',event)">✏️</span><b id="c-ko">0</b>KO</button>
            </div>
        </div>

        <h2>📦 ZONA FINAL (Embalaje)</h2>
        <div class="card">
            <div class="grid-count">
                <button class="btn-c" style="background:var(--success)" onclick="add('e','ok')"><span class="edit-pen" onclick="ed('e','ok',event)">✏️</span><b id="e-ok">0</b>OK</button>
                <button class="btn-c" style="background:var(--warning); color:black" onclick="add('e','r1')"><span class="edit-pen" onclick="ed('e','r1',event)">✏️</span><b id="e-r1">0</b>R1</button>
                <button class="btn-c" style="background:var(--danger)" onclick="add('e','ko')"><span class="edit-pen" onclick="ed('e','ko',event)">✏️</span><b id="e-ko">0</b>KO</button>
            </div>
        </div>
    </div>

    <div id="t-estaciones" class="content hidden">
        <div class="card">
            <div class="estacion-row">
                <b>KERAJET</b>
                <div class="timer-unit" id="timer-0">00:00</div>
                <button onclick="toggleT(0)" id="btn-0" style="background:var(--success); border:none; border-radius:5px; padding:8px;">PLAY</button>
            </div>
            <div class="estacion-row">
                <b>ESMALTADO</b>
                <div class="timer-unit" id="timer-1">00:00</div>
                <button onclick="toggleT(1)" id="btn-1" style="background:var(--success); border:none; border-radius:5px; padding:8px;">PLAY</button>
            </div>
            <div class="estacion-row">
                <b>MECÁNICO</b>
                <div class="timer-unit" id="timer-2">00:00</div>
                <button onclick="toggleT(2)" id="btn-2" style="background:var(--success); border:none; border-radius:5px; padding:8px;">PLAY</button>
            </div>
        </div>
        <button class="btn-action" onclick="enviarWA()">📤 ENVIAR INFORME WHATSAPP</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="nav('inicio',this)">INICIO</button>
    <button class="nav-item" onclick="nav('calidad',this)">CALIDAD</button>
    <button class="nav-item" onclick="nav('estaciones',this)">PARADAS</button>
</nav>

<script>
    let d = { of:'', desc:'', eq:'T1', trn:'Mañana (06-14)', c:{ok:0,r1:0,ko:0}, e:{ok:0,r1:0,ko:0}, paradas:[0,0,0], start:[null,null,null] };
    const OBJETIVO = 320;

    function init() {
        const s = localStorage.getItem('COMMANDER_V48');
        if(s) d = JSON.parse(s);
        render();
        setInterval(recalculo, 10000); // Recalcula cada 10 seg
    }

    function nav(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('t-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function add(z, t) { d[z][t]++; r(); g(); }
    function ed(z, t, event) {
        event.stopPropagation();
        let n = prompt("Corregir total "+t.toUpperCase(), d[z][t]);
        if(n !== null) { d[z][t] = parseInt(n) || 0; r(); g(); }
    }

    function toggleT(i) {
        const btn = document.getElementById('btn-'+i);
        if(!d.start[i]) {
            d.start[i] = Date.now();
            btn.innerText = "STOP"; btn.style.background = "var(--danger)";
        } else {
            d.paradas[i] += Math.floor((Date.now() - d.start[i])/1000);
            d.start[i] = null;
            btn.innerText = "PLAY"; btn.style.background = "var(--success)";
        }
        r(); g();
    }

    function recalculo() {
        const ahora = new Date();
        let horaInicio = new Date(); horaInicio.setHours(6,0,0);
        if(d.trn.includes("Tarde")) horaInicio.setHours(14,0,0);
        if(d.trn.includes("Noche")) horaInicio.setHours(22,0,0);

        let minsTranscurridos = (ahora - horaInicio) / 60000;
        if(minsTranscurridos < 0) minsTranscurridos += 1440; // Ajuste noche

        // Lógica Basilio: 30 min limpieza + 17 min tránsito = 47 min efectivos de "vacío"
        const minsProduciendo = Math.max(0, minsTranscurridos - 47);
        const piezasPorMinuto = OBJETIVO / (480 - 47); // 8h son 480min
        
        const objetivoActual = Math.floor(minsProduciendo * piezasPorMinuto);
        const actual = d.e.ok;
        const diff = actual - objetivoActual;

        const hDiff = document.getElementById('h-diff');
        hDiff.innerText = (diff > 0 ? "+" : "") + diff;
        hDiff.style.color = diff >= 0 ? 'var(--success)' : 'var(--danger)';

        const pred = Math.floor(actual + ((480 - minsTranscurridos) * (actual / Math.max(1, minsProduciendo))));
        document.getElementById('h-pred').innerText = pred;
    }

    function r() {
        document.getElementById('of').value = d.of;
        document.getElementById('desc').value = d.desc;
        document.getElementById('equipo').value = d.eq;
        document.getElementById('turno').value = d.trn;
        
        ['ok','r1','ko'].forEach(t => {
            document.getElementById('c-'+t).innerText = d.c[t];
            document.getElementById('e-'+t).innerText = d.e[t];
        });

        d.paradas.forEach((p, i) => {
            const m = String(Math.floor(p/60)).padStart(2,'0');
            const s = String(p%60).padStart(2,'0');
            document.getElementById('timer-'+i).innerText = `${m}:${s}`;
        });
        recalculo();
    }

    function g() {
        d.of = document.getElementById('of').value;
        d.desc = document.getElementById('desc').value;
        d.eq = document.getElementById('equipo').value;
        d.trn = document.getElementById('turno').value;
        localStorage.setItem('COMMANDER_V48', JSON.stringify(d));
    }

    function enviarWA() {
        const totC = d.c.ok + d.c.r1 + d.c.ko;
        const totE = d.e.ok + d.e.r1 + d.e.ko;
        const texto = `*INFORME PROD PORCELANOSA*%0AOF: ${d.of} (${d.desc})%0AEquipo: ${d.eq} | ${d.trn}%0A%0A*CRUDO:* OK:${d.c.ok} R1:${d.c.r1} KO:${d.c.ko} (Total: ${totC})%0A*EMBALAJE:* OK:${d.e.ok} R1:${d.e.r1} KO:${d.e.ko} (Total: ${totE})%0A%0A*PARADAS:*%0AKerajet: ${Math.floor(d.paradas[0]/60)}min%0AEsmalte: ${Math.floor(d.paradas[1]/60)}min%0AMecánico: ${Math.floor(d.paradas[2]/60)}min`;
        window.open(`https://wa.me/?text=${texto}`);
    }
</script>
</body>
</html>
