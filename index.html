<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QC DECORACIÓN</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c3e50">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232c3e50'/><text x='50' y='65' font-family='Arial' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>U</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232c3e50'/><text x='50' y='65' font-family='Arial' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>U</text></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        body { background: #f0f2f5; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { flex-shrink: 0; background: var(--primary); color: white; padding-top: env(safe-area-inset-top); z-index: 1000; }
        .app-header { padding: 15px; display: flex; align-items: center; gap: 15px; }
        .logo-u { background: white; color: var(--primary); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        
        .tabs { display: flex; background: #34495e; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: rgba(255,255,255,0.1); }

        .contenido-scroll { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid #e1e8ed; }
        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 8px; }
        label { font-size: 10px; font-weight: bold; color: var(--primary); margin-bottom: 3px; text-transform: uppercase; opacity: 0.7; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 10px; font-size: 14px; height: 42px; }

        .btn-principal { border: none; border-radius: 18px; padding: 15px; color: white; width: 100%; min-height: 100px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-ok { background: var(--success); box-shadow: 0 5px 0 #1e8449; margin-bottom: 12px; }
        .btn-nook { background: var(--danger); box-shadow: 0 5px 0 #b03a2e; }
        
        .num-btn { font-size: 45px; font-weight: bold; line-height: 1; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #1a252f; color: white; padding: 15px; border-radius: 15px; text-align: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; padding: 25px; border-radius: 25px; text-align: center; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        #pdf-content { position: absolute; left: -5000px; width: 600px; background: white; padding: 40px; }
    </style>
</head>
<body>

<div id="loading"><h2>🚀 ENVIANDO...</h2></div>

<header>
    <div class="app-header">
        <div class="logo-u">U</div>
        <div style="font-weight: bold; font-size: 14px;">CONTROL CALIDAD</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" id="t-calidad" onclick="verTab('calidad')">Calidad</button>
        <button class="tab-btn" id="t-final" onclick="verTab('final')">Final</button>
    </div>
</header>

<div class="contenido-scroll">
    <div class="card">
        <div class="grid-datos">
            <div class="campo"><label>Fecha</label><input type="date" id="inp-fecha"></div>
            <div class="campo"><label>Turno</label><select id="inp-turno"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
            <div class="campo"><label>OF</label><input type="text" id="inp-of" placeholder="0000"></div>
            <div class="campo"><label>Sustrato</label><input type="text" id="inp-sustrato"></div>
        </div>
    </div>

    <div class="card">
        <button class="btn-principal btn-ok" onclick="sumar('ok', 1)">
            <span style="font-size:12px; font-weight:bold;">PIEZAS OK</span>
            <span class="num-btn" id="txt-ok">0</span>
        </button>
        <button class="btn-principal btn-nook" onclick="abrirModalFallos()">
            <span style="font-size:12px; font-weight:bold;">PIEZAS NO OK</span>
            <span class="num-btn" id="txt-nook">0</span>
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span id="st-total" style="font-size:26px; font-weight:bold;">0</span><br><span style="font-size:9px; opacity:0.6;">TOTAL</span>
