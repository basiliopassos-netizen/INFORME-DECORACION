<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEMINI PROD V46 - EDICIÓN RÁPIDA</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0a0e14; --card: #161b22; --accent: #00d2ff; --success: #238636; --danger: #f85149; --text: #c9d1d9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; color: var(--text); }
        body { margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        /* Dashboard Header */
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .efficiency { font-weight: bold; color: var(--success); font-size: 14px; }

        .container { padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        
        /* Botones de Conteo con Edición Rápida */
        .btn-count { border: none; border-radius: 12px; padding: 25px 10px; font-weight: 900; font-size: 20px; text-align: center; cursor: pointer; transition: transform 0.1s; position: relative; }
        .btn-count:active { transform: scale(0.95); }
        .btn-count span { display: block; font-size: 10px; opacity: 0.8; margin-top: 5px; }
        .val { font-size: 32px; display: block; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        /* Estilos de inputs */
        input, select { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        
        /* Menú Inferior */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; height: 65px; border-top: 1px solid #30363d; }
        .nav-item { flex: 1; border: none; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--accent); border-top: 2px solid var(--accent); }

        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; flex-direction: column; align-items:center; justify-content:center; }
    </style>
</head>
<body onload="init()">

<div id="loading"><h3>⚙️ PROCESANDO IA</h3><p>Analizando Defecto y Lote...</p></div>

<header>
    <div><small>OF:</small> <b id="h-of">---</b></div>
    <div class="efficiency" id="h-efi">EFI: 100%</div>
</header>

<div class="container">
    <div id="tab-inicio" class="content">
        <div class="card">
            <label>IDENTIFICACIÓN DE TURNO</label>
            <div style="display:flex; gap:10px; margin-top:5px;">
                <select id="equipo" onchange="guardar()"><option>T1</option><option>T2</option><option>T3</option></select>
                <select id="turno" onchange="guardar()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select>
            </div>
            <button class="btn-count" style="width:100%; background:var(--accent); color:#000; margin-top:10px; padding:15px;" onclick="document.getElementById('f-ocr').click()">📷 ESCANEAR HOJA SAP</button>
            <input type="file" id="f-ocr" hidden onchange="leerSAP(this)">
        </div>
        <div class="card">
            <input type="text" id="of" placeholder="Nº Orden de Fabricación" oninput="guardar()">
            <input type="text" id="desc" placeholder="Modelo (Ej: Travertino)" oninput="guardar()">
        </div>
    </div>

    <div id="tab-calidad" class="content hidden">
        <div class="grid-3">
            <button class="btn-count" style="background:var(--success)" onclick="sumar('ok')" oncontextmenu="editar('ok'); return false;">
                <span class="val" id="v-ok">0</span>OK<span>Toque +1 / Mantén Edit</span>
            </button>
            <button class="btn-count" style="background:#f1c40f; color:#000" onclick="sumar('r1')" oncontextmenu="editar('r1'); return false;">
                <span class="val" id="v-r1">0</span>R1<span>Toque +1 / Mantén Edit</span>
            </button>
            <button class="btn-count" style="background:var(--danger)" onclick="sumar('ko')" oncontextmenu="editar('ko'); return false;">
                <span class="val" id="v-ko">0</span>KO<span>Toque +1 / Mantén Edit</span>
            </button>
        </div>
        
        <button class="btn-count" style="width:100%; margin-top:20px; background:#444" onclick="document.getElementById('f-defecto').click()">
            📸 IA: HACER FOTO A DEFECTO / LOTE
        </button>
        <input type="file" id="f-defecto" hidden onchange="analizarDefecto(this)">
        
        <div id="log-defectos" style="margin-top:15px; font-size:12px;"></div>
    </div>

    <div id="tab-informes" class="content hidden">
        <div class="card" id="resumen-final"></div>
        <button class="btn-count" style="width:100%; background:#25d366; color:white" onclick="enviarWA()">📤 ENVIAR WHATSAPP A OFICINA</button>
        <button class="btn-count" style="width:100%; background:#3498db; color:white; margin-top:10px" onclick="exportarPDF()">📄 GENERAR PDF FORMAL</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="nav('inicio', this)">🏠 INICIO</button>
    <button class="nav-item" onclick="nav('calidad', this)">🏺 CALIDAD</button>
    <button class="nav-item" onclick="nav('informes', this)">📊 INFORME</button>
</nav>

<script>
    let app = { of:'', desc:'', equipo:'T1', turno:'Mañana', ok:0, r1:0, ko:0, defectos:[] };

    function init() {
        const s = localStorage.getItem('PROD_V46');
        if(s) app = JSON.parse(s);
        render();
    }

    function nav(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'informes') generarResumen();
    }

    function sumar(tipo) { app[tipo]++; render(); guardar(); }
    
    function editar(tipo) {
        let n = prompt("Introduce el número total de piezas " + tipo.toUpperCase(), app[tipo]);
        if(n !== null) { app[tipo] = parseInt(n) || 0; render(); guardar(); }
    }

    async function leerSAP(input) {
        if(!input.files[0]) return;
        document.getElementById('loading').style.display = 'flex';
        const { data: { text } } = await Tesseract.recognize(input.files[0], 'eng');
        const ofs = text.match(/13\d{5}/); if(ofs) app.of = ofs[0];
        document.getElementById('loading').style.display = 'none';
        render(); guardar();
    }

    async function analizarDefecto(input) {
        if(!input.files[0]) return;
        document.getElementById('loading').style.display = 'flex';
        const { data: { text } } = await Tesseract.recognize(input.files[0], 'eng');
        
        // Buscamos si el sello de lote indica T1, T2 o T3
        const loteMatch = text.match(/T[1-3]/);
        const responsable = loteMatch ? loteMatch[0] : "Desconocido";
        
        app.defectos.push({ h: new Date().toLocaleTimeString(), resp: responsable, txt: "Defecto registrado vía foto" });
        app.ko++;
        document.getElementById('loading').style.display = 'none';
        render(); guardar();
        alert("Defecto registrado. Lote detectado como fabricado por: " + responsable);
    }

    function guardar() {
        app.of = document.getElementById('of').value;
        app.desc = document.getElementById('desc').value;
        app.equipo = document.getElementById('equipo').value;
        app.turno = document.getElementById('turno').value;
        localStorage.setItem('PROD_V46', JSON.stringify(app));
    }

    function render() {
        document.getElementById('of').value = app.of;
        document.getElementById('desc').value = app.desc;
        document.getElementById('h-of').innerText = app.of || '---';
        document.getElementById('v-ok').innerText = app.ok;
        document.getElementById('v-r1').innerText = app.r1;
        document.getElementById('v-ko').innerText = app.ko;
        
        const tot = app.ok + app.r1 + app.ko;
        const efi = tot > 0 ? ((app.ok / tot) * 100).toFixed(1) : 100;
        document.getElementById('h-efi').innerText = "EFI: " + efi + "%";
        document.getElementById('h-efi').style.color = efi > 90 ? 'var(--success)' : 'var(--danger)';

        document.getElementById('log-defectos').innerHTML = app.defectos.slice(-3).map(d => `<div>[${d.h}] Lote: ${d.resp} - ${d.txt}</div>`).join('');
    }

    function generarResumen() {
        const h = `<h3>RESUMEN TURNO ${app.equipo}</h3>
                   <p>OF: ${app.of} - ${app.desc}</p>
                   <hr>
                   <p>PRIMERA: ${app.ok} pzs</p>
                   <p>REPROCESO: ${app.r1} pzs</p>
                   <p>RECHAZO: ${app.ko} pzs</p>
                   <p><b>TOTAL: ${app.ok + app.r1 + app.ko} pzs</b></p>`;
        document.getElementById('resumen-final').innerHTML = h;
    }

    function enviarWA() {
        const msg = `*INFORME PRODUCCIÓN*%0AOF: ${app.of}%0AEquipo: ${app.equipo}%0AOK: ${app.ok}%0AR1: ${app.r1}%0AKO: ${app.ko}`;
        window.open(`https://wa.me/?text=${msg}`);
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("INFORME DE PRODUCCIÓN", 20, 20);
        doc.text("OF: " + app.of, 20, 30);
        doc.text("Equipo: " + app.equipo, 20, 40);
        doc.text("Primera: " + app.ok, 20, 50);
        doc.save("Informe_" + app.of + ".pdf");
    }
</script>
</body>
</html>
