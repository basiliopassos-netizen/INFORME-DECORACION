<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V44.2 - SAP READY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; color: var(--text); }
        body { margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; }
        .container { padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn-smart { background: var(--accent); color: #0f172a; border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2); }
        label { font-size: 10px; color: #94a3b8; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-size: 15px; }
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.95); z-index:5000; flex-direction: column; align-items:center; justify-content:center; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-val { padding: 20px 10px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body onload="cargar()">

<div id="loading"><h3>🔍 LEYENDO SAP...</h3><p>Buscando OF y Material</p></div>

<header><b>DIGITALIZACIÓN PORCELANOSA</b></header>

<div class="container">
    <button class="btn-smart" onclick="document.getElementById('input-file').click()">
        📸 ESCANEAR HOJA SAP (Carlos/Agus)
    </button>
    <input type="file" id="input-file" accept="image/*" style="display:none" onchange="analizarHoja(this)">

    <div class="card">
        <label>Orden de Fabricación (OF)</label>
        <input type="text" id="of" oninput="guardar()">
        <label>Código SAP Material</label>
        <input type="text" id="sap" oninput="guardar()">
        <label>Descripción / Modelo</label>
        <input type="text" id="desc" oninput="guardar()">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Cantidad OF</label><input type="text" id="cant" oninput="guardar()"></div>
            <div><label>Turno</label><select id="turno" style="background:#0f172a; color:white; padding:12px; width:100%; border-radius:8px;"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
        </div>
    </div>

    <div class="grid-3">
        <button class="btn-val" style="background:#22c55e" onclick="contar('ok')">OK<br><span id="v-ok">0</span></button>
        <button class="btn-val" style="background:#eab308" onclick="contar('r1')">R1<br><span id="v-r1">0</span></button>
        <button class="btn-val" style="background:#ef4444" onclick="contar('ko')">KO<br><span id="v-ko">0</span></button>
    </div>
</div>

<script>
    let db = { of:'', sap:'', desc:'', cant:'', ok:0, r1:0, ko:0 };

    async function analizarHoja(input) {
        if (!input.files[0]) return;
        document.getElementById('loading').style.display = 'flex';
        
        const { data: { text } } = await Tesseract.recognize(input.files[0], 'eng');
        const lineas = text.split('\n');

        // LÓGICA PORCELANOSA:
        // 1. OF suele ser el número de 7 dígitos arriba a la derecha
        const ofMatch = text.match(/13\d{5}/); // Las de ahora suelen empezar por 13
        if(ofMatch) db.of = ofMatch[0];

        // 2. SAP Material suele empezar por 100
        const sapMatch = text.match(/100\d{6}/);
        if(sapMatch) db.sap = sapMatch[0];

        // 3. Modelo: Intentamos pillar la línea que contenga "TRAVERTINO" o nombres de mármol
        lineas.forEach(l => {
            if(l.includes('100') && l.length > 15) {
                db.desc = l.replace(db.sap, '').trim();
            }
            if(l.includes('PZS')) {
                db.cant = l.match(/\d+.\d+/)?.[0] || '';
            }
        });

        document.getElementById('loading').style.display = 'none';
        render(); guardar();
    }

    function contar(t) { db[t]++; render(); guardar(); }
    function render() {
        document.getElementById('of').value = db.of;
        document.getElementById('sap').value = db.sap;
        document.getElementById('desc').value = db.desc;
        document.getElementById('cant').value = db.cant;
        document.getElementById('v-ok').innerText = db.ok;
        document.getElementById('v-r1').innerText = db.r1;
        document.getElementById('v-ko').innerText = db.ko;
    }
    function guardar() {
        db.of = document.getElementById('of').value;
        db.sap = document.getElementById('sap').value;
        db.desc = document.getElementById('desc').value;
        db.cant = document.getElementById('cant').value;
        localStorage.setItem('PROD_V44_2', JSON.stringify(db));
    }
    function cargar() {
        const s = localStorage.getItem('PROD_V44_2');
        if(s) { db = JSON.parse(s); render(); }
    }
</script>
</body>
</html>
