<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decoline V62 - Nexus Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0d47a1; --green: #2e7d32; --red: #b71c1c; --orange: #e65100; --gray: #eceff1; --sidebar-w: 75px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: var(--blue); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1001; }
        .side-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 24px; cursor: pointer; padding: 12px; border-radius: 15px; width: 60px; text-align: center; }
        .side-btn.active { color: white; background: rgba(255,255,255,0.2); }
        .side-label { font-size: 8px; display: block; margin-top: 4px; font-weight: bold; text-transform: uppercase; }
        .main { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .sect { display: none; }
        .sect.active { display: block; }
        .kpi-box { background: linear-gradient(135deg, var(--blue), #002171); color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .f-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .f-val { display: block; font-size: 15px; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #cfd8dc; }
        h3 { margin: 0 0 10px 0; color: var(--blue); font-size: 11px; border-left: 4px solid var(--blue); padding-left: 10px; text-transform: uppercase; }
        label { font-weight: bold; font-size: 9px; color: #546e7a; display: block; margin-top: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #b0bec5; border-radius: 10px; font-size: 14px; box-sizing: border-box; text-transform: uppercase; }
        input[type="time"], input[type="date"] { text-transform: none; }
        .grid-sem { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .sem-btn { padding: 12px 5px; border-radius: 15px; border: 2px solid; background: white; font-weight: bold; text-align: center; cursor: pointer; }
        .sem-val { display: block; font-size: 24px; color: #263238; }
        .btn-green { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; justify-content:center; align-items:center; }
        .m-content { background:white; width:92%; border-radius:25px; padding:20px; max-height: 85vh; overflow-y: auto; }
        .m-btn { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; width: 100%; margin-bottom: 8px; border-radius: 12px; font-weight: bold; text-align: left; }
        .hist-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; font-size: 11px; align-items: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="side-btn active" onclick="setTab(0, this)">🏠<span class="side-label">DASH</span></button>
    <button class="side-btn" onclick="setTab(1, this)">⚙️<span class="side-label">MAEST</span></button>
    <button class="side-btn" onclick="setTab(2, this)">🔍<span class="side-label">CALID</span></button>
    <button class="side-btn" onclick="setTab(3, this)">📦<span class="side-label">EMBAL</span></button>
    <button class="side-btn" onclick="setTab(4, this)">⚠️<span class="side-label">PARAD</span></button>
    <button class="side-btn" onclick="setTab(5, this)">📝<span class="side-label">HIST</span></button>
</div>

<div class="main">
    <div id="tab0" class="sect active">
        <div class="kpi-box">
            <span style="font-size:10px; text-transform:uppercase;">Predicción Final A-B-C</span>
            <div class="f-grid">
                <div class="f-card"><span>OPTIMISTA (A)</span><span class="f-val" id="f-a">0</span></div>
                <div class="f-card" style="background:rgba(255,255,255,0.2)"><span>REALISTA (B)</span><span class="f-val" id="f-b">0</span></div>
                <div class="f-card"><span>CRÍTICO (C)</span><span class="f-val" id="f-c">0</span></div>
            </div>
        </div>
        <div class="card">
            <h3>Registro del Turno</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Fecha</label><input type="date" id="f-fecha" onchange="sync()"></div>
                <div><label>Orden (OF)</label><input type="text" id="f-of" oninput="sync()"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Código SAP</label><input type="text" id="f-sap" oninput="sync()"></div>
                <div><label>Lote ADN</label><input type="text" id="f-lote" oninput="sync()"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Gráfica</label><input type="text" id="f-graf" oninput="sync()"></div>
                <div><label>Sustrato</label><input type="text" id="f-sust" oninput="sync()"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Turno</label><select id="f-turno" onchange="sync()"><option>MAÑANA</option><option>TARDE</option><option>NOCHE</option></select></div>
                <div><label>Equipo</label><select id="f-equi" onchange="sync()"><option>T1</option><option>T2</option><option>T3</option></select></div>
            </div>
        </div>
    </div>

    <div id="tab1" class="sect">
        <div class="card">
            <h3>Configuración Maestro</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Inicio</label><input type="time" id="cfg-h-ini" value="06:00" onchange="sync()"></div>
                <div><label>Cierre</label><input type="time" id="cfg-h-fin" value="14:15" onchange="sync()"></div>
            </div>
            <label>Cadencia (Seg/Pza)</label><input type="number" step="0.1" id="cfg-seg" value="6.5" onchange="sync()">
            <label>Piezas Iniciales</label><input type="number" id="cfg-pz-ini" oninput="sync()">
        </div>
        <div class="card">
            <button class="btn-green" onclick="document.getElementById('m-new-def').style.display='flex'">[+ NUEVO DEFECTO]</button>
            <button class="btn-green" style="background:var(--orange)" onclick="document.getElementById('m-new-par').style.display='flex'">[+ NUEVO MOTIVO PARADA]</button>
            <div id="custom-lists" style="font-size:11px; margin-top:10px;"></div>
        </div>
        <button class="btn-green" style="background:var(--red)" onclick="if(confirm('¿Reiniciar?')){localStorage.clear(); location.reload();}">REINICIAR TURNO</button>
    </div>

    <div id="tab2" class="sect">
        <div class="card"><h3>Calidad Sustrato</h3><div class="grid-sem"><div class="sem-btn">OK<span class="sem-val" id="v-cal-ok">0</span></div><div class="sem-btn" onclick="openModal('R1', 'SUSTRATO')">R1<span class="sem-val" id="v-cal-r1">0</span></div><div class="sem-btn" onclick="openModal('NO OK', 'SUSTRATO')">NO OK<span class="sem-val" id="v-cal-no">0</span></div></div><label>Contador OK Manual</label><input type="number" id="in-cal-ok" oninput="db.cal.ok=parseInt(this.value)||0; sync();"></div>
    </div>

    <div id="tab3" class="sect">
        <div class="card"><h3>Embalaje Final</h3><div class="grid-sem"><div class="sem-btn">OK<span class="sem-val" id="v-emb-ok">0</span></div><div class="sem-btn" onclick="openModal('R1', 'EMBALAJE')">R1<span class="sem-val" id="v-emb-r1">0</span></div><div class="sem-btn" onclick="openModal('NO OK', 'EMBALAJE')">NO OK<span class="sem-val" id="v-emb-no">0</span></div></div><label>Contador OK Manual</label><input type="number" id="in-emb-ok" oninput="db.emb.ok=parseInt(this.value)||0; sync();"></div>
    </div>

    <div id="tab4" class="sect">
        <div class="card">
            <h3>Paradas</h3>
            <label>Estación</label><select id="p-est"><option>LGV</option><option>ROBOTIONS</option><option>CEPILLADORA</option><option>CABINA 1</option><option>HORNOS</option><option>ERRECE</option><option>KERAJET</option><option>TRASLOW</option><option>CABINA 2</option><option>EMBALAJE</option></select>
            <label>Motivo Rápido</label><select id="p-quick-obs" onchange="document.getElementById('p-obs').value=this.value.toUpperCase()"><option value="">-- SELECCIONAR --</option></select>
            <div style="display:flex; gap:10px; margin-top:8px;"><input type="time" id="p-h1"><input type="time" id="p-h2"></div>
            <textarea id="p-obs" placeholder="Motivo manual..."></textarea>
            <label>Comentario Extra</label><input type="text" id="p-comment" placeholder="Ej: LADO IZQUIERDO">
            <button class="btn-green" onclick="addParada()">Guardar Parada</button>
        </div>
    </div>

    <div id="tab5" class="sect"><div class="card"><h3>Historial</h3><div id="h-content"></div></div><button class="btn-green" style="background:var(--blue)" onclick="generarPDF()">DESCARGAR AUDITORÍA V62</button></div>
</div>

<div id="modal"><div class="m-content"><h3 id="m-title">Defecto</h3><div id="m-ops"></div><div id="m-extra" style="display:none; border-top:1px solid #ddd; padding-top:10px;"><div id="m-extra-sust"><label>Trazabilidad</label><input type="text" id="m-val-sust" placeholder="Lote / Cav / Prensa"></div><div id="m-extra-emb" style="display:none;"><label>Origen</label><select id="m-val-emb"><option>KERAJET</option><option>CABINA 1</option><option>CABINA 2</option><option>UV</option><option>OTRO</option></select></div><label>Comentario Extra</label><input type="text" id="m-val-comment" placeholder="Nota..."><button class="btn-green" onclick="saveDef()">Confirmar</button></div><button class="btn-green" style="background:#888" onclick="closeM()">Cerrar</button></div></div>

<div id="m-new-def" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;"><div class="m-content"><h3>Nuevo Defecto</h3><label>Nombre</label><input type="text" id="nd-name"><label>Zona</label><select id="nd-zona"><option value="SUSTRATO">Calidad</option><option value="EMBALAJE">Embalaje</option></select><label>Tipo</label><select id="nd-tipo"><option value="R1">R1</option><option value="NO OK">NO OK</option></select><button class="btn-green" onclick="createNewDef()">Guardar</button><button class="btn-green" style="background:#888" onclick="document.getElementById('m-new-def').style.display='none'">Cerrar</button></div></div>

<div id="m-new-par" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;"><div class="m-content"><h3>Nuevo Motivo Rápido</h3><label>Descripción</label><input type="text" id="np-name"><button class="btn-green" onclick="createNewParadaMotivo()">Guardar</button><button class="btn-green" style="background:#888" onclick="document.getElementById('m-new-par').style.display='none'">Cerrar</button></div></div>

<script>
    var db = JSON.parse(localStorage.getItem('decoline_v62')) || {
        reg: { fecha: new Date().toISOString().split('T')[0], of:'', sap:'', lote:'', graf:'', sust:'', turno:'MAÑANA', equi:'T1' },
        cal: {ok:0, r1:0, no:0, hist:[]}, emb: {ok:0, r1:0, no:0, hist:[]},
        parad: [], cfg: {h_ini:'06:00', h_fin:'14:15', seg:6.5, pz_ini:0}, customDefs: [], customPars: []
    };

    let temp = {};
    const DEFS_BASE = ["ROTA", "BULTOS", "DIMENSIONES", "GOTA", "SUCIA", "MALLA", "OTRO"];

    function setTab(n, btn) {
        document.querySelectorAll('.sect').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.sect')[n].classList.add('active');
        btn.classList.add('active');
        if(n === 4) updateQuickPars();
        if(n === 5) renderHist();
        if(n === 1) renderCustomLists();
    }

    function sync() {
        db.reg.fecha = document.getElementById('f-fecha').value;
        db.reg.of = document.getElementById('f-of').value.toUpperCase();
        db.reg.sap = document.getElementById('f-sap').value.toUpperCase();
        db.reg.lote = document.getElementById('
