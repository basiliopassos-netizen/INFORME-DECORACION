<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V18 - BOTÓN COMPARTIR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f0f2f5; --info: #3498db; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; position: sticky; top:0; z-index:100; display: flex; justify-content: space-between; }
        .tabs { display: flex; background: #34495e; position: sticky; top:50px; z-index:100; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; font-size: 11px; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: rgba(255,255,255,0.1); }
        .contenido { padding: 10px; }
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 9px; font-weight: 800; color: #7f8c8d; text-transform: uppercase; margin-bottom: 2px; display: block; }
        input, select, textarea { padding: 10px; border: 1px solid #dce1e5; border-radius: 8px; width: 100%; font-size: 14px; margin-bottom: 5px; }
        .fila-contador { display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch; }
        .btn-count { flex: 1; border: none; border-radius: 15px; padding: 15px; color: white; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-ok { background: var(--success); box-shadow: 0 4px 0 #1e8449; }
        .btn-nook { background: var(--danger); box-shadow: 0 4px 0 #b03a2e; }
        .btn-edit-manual { width: 50px; background: white; border: 2px solid #dce1e5; border-radius: 12px; font-size: 20px; color: var(--info); display: flex; align-items: center; justify-content: center; }
        .btn-action { background: #007bff; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 8px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:92%; padding:15px; border-radius:15px; max-height: 85vh; overflow-y: auto; }
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:5000; flex-direction: column; align-items:center; justify-content:center; }
        .hidden { display: none; }
    </style>
</head>
<body onload="cargarTodo()">

<div id="loading"><h2 id="load-txt">🚀 PROCESANDO...</h2></div>

<header><b>PRODUCCIÓN V18</b> <span id="mem-status" style="font-size:10px; opacity:0.7;">Memoria OK</span></header>

<div class="tabs">
    <button class="tab-btn active" id="btn-calidad" onclick="cambiarTab('calidad')">CALIDAD</button>
    <button class="tab-btn" id="btn-final" onclick="cambiarTab('final')">FINAL</button>
    <button class="tab-btn" id="btn-eventos" onclick="cambiarTab('eventos')">EVENTOS</button>
</div>

<div class="contenido">
    <div class="card">
        <div class="grid">
            <div><label>OF</label><input type="text" id="of" placeholder="Nº Orden" oninput="guardarTodo()"></div>
            <div><label>Turno</label><select id="turno" onchange="guardarTodo()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
        </div>
        <div style="margin-top:5px;"><label>Gráfica</label><input type="text" id="grafica" placeholder="Nombre diseño" oninput="guardarTodo()"></div>
        <div style="margin-top:5px;"><label>Material</label><input type="text" id="material" placeholder="Sustrato" oninput="guardarTodo()"></div>
    </div>

    <div id="vista-produccion">
        <div class="fila-contador">
            <button class="btn-count btn-ok" onclick="sumarUno('ok')">PIEZAS OK <b id="val-ok" style="font-size:24px;">0</b></button>
            <button class="btn-edit-manual" onclick="editarCifra('ok')">✎</button>
        </div>
        <div class="fila-contador">
            <button class="btn-count btn-nook" onclick="abrirDefectos()">FALLOS <b id="val-nook" style="font-size:24px;">0</b></button>
            <button class="btn-edit-manual" onclick="editarCifra('nook')">✎</button>
        </div>
    </div>

    <div id="vista-eventos" class="hidden">
        <div class="card">
            <label>Estación</label>
            <select id="ev-estacion"><option>HORNOS</option><option>ROBOTTIONS</option><option>CABINA 1</option><option>KERAJET</option><option>CABINA 2</option><option>ERRECE</option></select>
            <label>Motivo</label><textarea id="ev-desc" rows="2"></textarea>
            <div class="grid" style="margin-top:5px;">
                <div><label>Inicio</label><input type="time" id="ev-ini"></div>
                <div><label>Fin</label><input type="time" id="ev-fin"></div>
            </div>
            <button class="btn-action" style="background:var(--info);" onclick="abrirFoto('evento')">📸 FOTO PARADA</button>
            <p id="st-foto-ev" style="display:none; color:green; text-align:center; font-size:11px; margin:5px;">✓ Foto lista</p>
            <button class="btn-action" onclick="guardarEvento()">💾 GUARDAR PARADA</button>
        </div>
    </div>

    <button class="btn-action" style="height:70px; font-size:16px; margin-top:20px; background:#2c3e50;" onclick="generarPDF()">📤 COMPARTIR INFORME (PDF)</button>
    <button onclick="resetearTodo()" style="width:100%; border:none; background:none; color:#bbb; margin-top:40px; font-size:10px;">BORRAR TODO Y REINICIAR</button>
</div>

<div id="modal-app" class="modal"><div class="modal-box" id="modal-content"></div></div>
<input type="file" id="in-cam" accept="image/*" capture="environment" style="display:none" onchange="procesarFoto(event)">
<input type="file" id="in-gal" accept="image/*" style="display:none" onchange="procesarFoto(event)">

<script>
    const CONFIG = { calidad: ["Bultos", "Malla suelta", "Rota", "Sucia"], final: ["Gota Kerajet", "Tono", "Rascada", "Manchada", "Corte Impresión", "Esquina rota", "Borde roto"] };
    let db = { calidad: { ok: 0, nook: 0, registros: [] }, final: { ok: 0, nook: 0, registros: [] }, eventos: [], cabecera: { of: "", turno: "Mañana", grafica: "", material: "" } };
    let tabActual = 'calidad', modoFoto = "", pasoFoto = 1, defectoActivo = "", fotoTempEv = null;

    function guardarTodo() { 
        db.cabecera = { of: document.getElementById('of').value, turno: document.getElementById('turno').value, grafica: document.getElementById('grafica').value, material: document.getElementById('material').value }; 
        try { localStorage.setItem('PROD_V18', JSON.stringify(db)); document.getElementById('mem-status').innerText = "Memoria OK"; } catch(e) { document.getElementById('mem-status').innerText = "⚠️ LLENO"; }
    }

    function cargarTodo() { 
        const g = localStorage.getItem('PROD_V18'); 
        if(g){ 
            db = JSON.parse(g); 
            document.getElementById('of').value = db.cabecera.of || ""; 
            document.getElementById('turno').value = db.cabecera.turno || "Mañana"; 
            document.getElementById('grafica').value = db.cabecera.grafica || ""; 
            document.getElementById('material').value = db.cabecera.material || "";
        } 
        actualizarUI(); 
    }

    function editarCifra(tipo) {
        let n = prompt("Introduce cantidad:", db[tabActual][tipo]);
        if(n !== null) { db[tabActual][tipo] = parseInt(n) || 0; actualizarUI(); guardarTodo(); }
    }

    function resetearTodo() { if(confirm("¿Borrar todo?")) { localStorage.removeItem('PROD_V18'); location.reload(); } }
    function cambiarTab(t) { tabActual = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); document.getElementById('vista-produccion').classList.toggle('hidden', t === 'eventos'); document.getElementById('vista-eventos').classList.toggle('hidden', t !== 'eventos'); actualizarUI(); }
    function sumarUno(tipo) { db[tabActual][tipo]++; actualizarUI(); guardarTodo(); }

    function abrirDefectos() {
        let h = `<h3>Fallo en ${tabActual.toUpperCase()}</h3>`;
        CONFIG[tabActual].forEach(d => { h += `<button class="btn-action" style="background:#f8f9fa; color:black; text-align:left; border:1px solid #ddd;" onclick="seleccionarDefecto('${d}')">${d}</button>`; });
        h += `<button onclick="cerrarModal()" style="margin-top:10px; width:100%;">Cerrar</button>`;
        document.getElementById('modal-content').innerHTML = h;
        document.getElementById('modal-app').style.display = 'flex';
    }

    function seleccionarDefecto(d) { defectoActivo = d; pasoFoto = 1; abrirFoto('registro'); }
    function abrirFoto(modo) {
        modoFoto = modo;
        document.getElementById('modal-content').innerHTML = `<h3>${modo === 'evento' ? 'Foto Parada' : 'Foto '+pasoFoto+'/2'}</h3><button class="btn-action" style="background:#27ae60;" onclick="document.getElementById('in-cam').click()">📸 CÁMARA</button><button class="btn-action" style="background:#3498db;" onclick="document.getElementById('in-gal').click()">🖼️ GALERÍA</button>`;
    }

    function procesarFoto(e) {
        if(!e.target.files[0]) return;
        document.getElementById('loading').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 600;
                let w = img.width, h = img.height;
                if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                if(modoFoto === 'evento') { fotoTempEv = dataUrl; document.getElementById('st-foto-ev').style.display = 'block'; cerrarModal(); } 
                else {
                    if(pasoFoto === 1) { db[tabActual].nook++; db[tabActual].registros.push({ defecto: defectoActivo, hora: new Date().toLocaleTimeString(), foto1: dataUrl, foto2: null }); pasoFoto = 2; abrirFoto('registro'); } 
                    else { db[tabActual].registros[db[tabActual].registros.length - 1].foto2 = dataUrl; cerrarModal(); }
                }
                actualizarUI(); guardarTodo(); document.getElementById('loading').style.display = 'none';
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function guardarEvento() {
        const est = document.getElementById('ev-estacion').value, des = document.getElementById('ev-desc').value, ini = document.getElementById('ev-ini').value, fin = document.getElementById('ev-fin').value;
        if(!ini || !fin || !des) return alert("Faltan datos");
        db.eventos.push({ estacion: est, desc: des, inicio: ini, fin: fin, foto: fotoTempEv });
        fotoTempEv = null; document.getElementById('st-foto-ev').style.display = 'none'; document.getElementById('ev-desc').value = ""; guardarTodo(); alert("Guardada");
    }

    function cerrarModal() { document.getElementById('modal-app').style.display = 'none'; }
    function actualizarUI() { document.getElementById('val-ok').innerText = db[tabActual].ok; document.getElementById('val-nook').innerText = db[tabActual].nook; }

    async function generarPDF() {
        document.getElementById('loading').style.display = 'flex';
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16); doc.text("INFORME DE PRODUCCIÓN", 14, 20);
        doc.setFontSize(10); doc.text(`OF: ${db.cabecera.of} | Turno: ${db.cabecera.turno}`, 14, 28);
        doc.text(`Gráfica: ${db.cabecera.grafica} | Material: ${db.cabecera.material}`, 14, 33);
        doc.line(14, 36, 196, 36);
        let y = 44;
        const addTxt = (t, s=11) => { if(y>270){doc.addPage(); y=20;} doc.setFontSize(s); doc.text(t, 14, y); y+=7; };
        addTxt("1. RESUMEN PIEZAS", 14);
        addTxt(`CALIDAD: OK ${db.calidad.ok} / FALLOS ${db.calidad.nook}`);
        addTxt(`FINAL: OK ${db.final.ok} / FALLOS ${db.final.nook}`);
        y += 5;
        const renderSec = (tit, reg) => {
            if(reg.length === 0) return;
            addTxt(tit, 13);
            reg.forEach(r => {
                if(y > 240) { doc.addPage(); y = 20; }
                doc.setFontSize(9); doc.text(`${r.defecto} (${r.hora})`, 14, y);
                if(r.foto1) doc.addImage(r.foto1, 'JPEG', 14, y+2, 45, 35);
                if(r.foto2) doc.addImage(r.foto2, 'JPEG', 65, y+2, 45, 35);
                y += 45;
            });
        };
        renderSec("DETALLE CALIDAD", db.calidad.registros);
        renderSec("DETALLE FINAL", db.final.registros);
        if(db.eventos.length > 0) {
            addTxt("2. PARADAS", 13);
            db.eventos.forEach(ev => {
                if(y > 240) { doc.addPage(); y = 20; }
                let lines = doc.splitTextToSize(`${ev.estacion} (${ev.inicio}-${ev.fin}): ${ev.desc}`, 170);
                doc.text(lines, 14, y); y += (lines.length * 5);
                if(ev.foto) { doc.addImage(ev.foto, 'JPEG', 14, y, 50, 40); y += 45; }
                y += 5;
            });
        }
        
        // --- AQUÍ EL CAMBIO PARA COMPARTIR ---
        const pdfBlob = doc.output('blob');
        const fileName = `Informe_${db.cabecera.of || 'produccion'}.pdf`;
        const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
        
        document.getElementById('loading').style.display = 'none';
        
        if (navigator.share) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Informe de Producción',
                    text: 'Se adjunta informe de producción decorativa.'
                });
            } catch (err) {
                doc.save(fileName);
            }
        } else {
            doc.save(fileName);
        }
    }
</script>
</body>
</html>
