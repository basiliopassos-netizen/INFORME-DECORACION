<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decoline V41 - Nexus Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #1a237e; --green: #2e7d32; --red: #c62828; --orange: #ef6c00; --gray: #f8f9fa; --sidebar-w: 75px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); display: flex; height: 100vh; overflow: hidden; color: #333; }
        
        /* Sidebar Estilo Pro */
        .sidebar { width: var(--sidebar-w); background: var(--blue); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 1001; }
        .side-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 24px; cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 15px; width: 60px; text-align: center; }
        .side-btn.active { color: white; background: rgba(255,255,255,0.15); box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .side-label { font-size: 8px; display: block; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; position: relative; }
        .sect { display: none; animation: slideUp 0.3s ease-out; }
        .sect.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard & Forecast */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .kpi { background: white; padding: 15px; border-radius: 18px; border: 1px solid #ddd; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .kpi-main { grid-column: span 2; background: linear-gradient(135deg, #1a237e, #311b92); color: white; border: none; }
        .kpi-val { font-size: 28px; font-weight: bold; display: block; margin: 5px 0; }
        .kpi-lab { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        /* Form & Cards */
        .card { background: white; padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #ddd; position: relative; }
        h3 { margin: 0 0 15px 0; color: var(--blue); font-size: 14px; border-left: 5px solid var(--blue); padding-left: 10px; }
        label { font-weight: bold; font-size: 12px; color: #555; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        /* Botones Nexus */
        .btn-green { background: var(--green); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .grid-sem { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .sem-btn { padding: 15px 5px; border-radius: 15px; border: 2px solid; background: white; font-weight: bold; text-align: center; cursor: pointer; }
        
        /* Historial / CRUD */
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-del { color: var(--red); border: none; background: none; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* Modal */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; justify-content:center; align-items:center; }
        .m-content { background:white; width:90%; border-radius:25px; padding:25px; max-height: 80vh; overflow-y: auto; }
        .m-btn { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; width: 100%; margin-bottom: 10px; border-radius: 12px; font-weight: bold; text-align: left; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="side-btn active" onclick="setTab(0, this)">🏠<span class="side-label">Dash</span></button>
    <button class="side-btn" onclick="setTab(1, this)">🔍<span class="side-label">Calid</span></button>
    <button class="side-btn" onclick="setTab(2, this)">📦<span class="side-label">Embal</span></button>
    <button class="side-btn" onclick="setTab(3, this)">⚠️<span class="side-label">Parad</span></button>
    <button class="side-btn" onclick="setTab(4, this)">📝<span class="side-label">Hist</span></button>
    <button class="side-btn" onclick="setTab(5, this)">⚙️<span class="side-label">Maest</span></button>
</div>

<div class="main">
    <div id="tab0" class="sect active">
        <div class="dashboard">
            <div class="kpi kpi-main">
                <span class="kpi-lab">🔮 Proyección de Cierre</span>
                <span class="kpi-val" id="k-forecast">0</span>
                <span style="font-size:9px; opacity:0.8;">Pzs OK estimadas al final del turno</span>
            </div>
            <div class="kpi">
                <span class="kpi-lab">OK Producidas</span>
                <span class="kpi-val" id="k-ok" style="color:var(--green)">0</span>
            </div>
            <div class="kpi">
                <span class="kpi-lab">Mermas %</span>
                <span class="kpi-val" id="k-merma" style="color:var(--red)">0%</span>
            </div>
        </div>
        <div class="card">
            <h3>Trazabilidad Lote ADN</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="f-lote" maxlength="5" placeholder="1CC25" oninput="parseLote(this.value); sync();">
                <button id="btn-pin" onclick="togglePin()" style="border:none; border-radius:12px; background:#ddd; padding:0 15px;">📌</button>
            </div>
            <div id="lote-det" style="font-size:10px; margin-top:10px; display:flex; justify-content: space-around; font-weight:bold; color:var(--blue)">
                <span>LÍNEA: -</span><span>MES: -</span><span>DÍA: -</span>
            </div>
        </div>
    </div>

    <div id="tab1" class="sect">
        <div class="card">
            <h3>Control Calidad Sustrato</h3>
            <div class="grid-sem">
                <div class="sem-btn" style="border-color:var(--green); color:var(--green)">OK<span id="v-ok-c" style="display:block; font-size:18px;">0</span></div>
                <div class="sem-btn" style="border-color:var(--orange); color:var(--orange)" onclick="openDef('R1', 'Calidad')">R1</div>
                <div class="sem-btn" style="border-color:var(--red); color:var(--red)" onclick="openDef('NO OK', 'Calidad')">NO OK</div>
            </div>
            <label>Piezas OK en Cajón</label>
            <input type="number" id="in-ok" placeholder="Acumulado piezas OK..." oninput="db.prod.ok=this.value; sync();">
        </div>
    </div>

    <div id="tab2" class="sect">
        <div class="card">
            <h3>Embalaje / Decoración</h3>
            <div class="grid-sem">
                <div class="sem-btn" style="border-color:var(--orange); color:var(--orange)" onclick="openDef('R1', 'Embalaje')">R1</div>
                <div class="sem-btn" style="border-color:var(--red); color:var(--red)" onclick="openDef('NO OK', 'Embalaje')">NO OK</div>
            </div>
        </div>
    </div>

    <div id="tab3" class="sect">
        <div class="card">
            <h3>Registro de Incidencias</h3>
            <label>Estación</label>
            <select id="p-est" onchange="updateMotivos(this.value)">
                <option value="KERAJET">KERAJET</option>
                <option value="CABINA 2">CABINA 2 / EXTRAMATE</option>
                <option value="UV">UV / PULMÓN</option>
                <option value="LGV">LGV</option>
                <option value="OTRO">OTRO</option>
            </select>
            <label>Motivo</label>
            <select id="p-mot"></select>
            <div style="display:flex; gap:10px; margin-top:12px;">
                <input type="time" id="p-h1"><input type="time" id="p-h2">
            </div>
            <button class="btn-green" onclick="addP()">Guardar Parada</button>
        </div>
    </div>

    <div id="tab4" class="sect">
        <div class="card">
            <h3>Historial de Eventos</h3>
            <div id="hist-lista"></div>
        </div>
        <button class="btn-green" style="background:var(--blue)" onclick="generarPDF()">Generar PDF Gerencia</button>
    </div>

    <div id="tab5" class="sect">
        <div class="card">
            <h3>Configuración Maestro</h3>
            <label>Hora Finalización Turno</label>
            <input type="time" id="cfg-cierre" value="14:00" onchange="sync()">
            <label>Cadencia Media (Pzs/h)</label>
            <input type="number" id="cfg-cad" value="650" onchange="sync()">
            <button class="btn-green" style="background:var(--red); margin-top:30px;" onclick="if(confirm('¿Borrar turno?')){localStorage.clear(); location.reload();}">Borrar Datos Turno</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="m-content">
        <h3 id="m-title">Defecto</h3>
        <div id="m-ops"></div>
        <button class="btn-green" style="background:#888" onclick="closeModal()">Cerrar</button>
    </div>
</div>

<script>
    var db = JSON.parse(localStorage.getItem('decoline_v41')) || {
        reg: { lote:'', linea:'', mes:'', dia:'', pin:false, h_cierre:'14:00', cadencia:650 },
        prod: { ok:0, r1:0, noko:0, detalles:[] },
        paradas: []
    };

    const MOTIVOS = {
        "KERAJET": ["Limpieza Aspiración", "Falta Tinta", "Ajuste Tono", "Gota"],
        "CABINA 2": ["Boquillas Obstruidas", "Carga Producto", "Limpieza Banda"],
        "UV": ["Rearme Temperatura", "Falla Sensor", "Pulmón Lleno"],
        "LGV": ["Bloqueo de Ruta", "Batería Baja"],
        "OTRO": ["Mecánico", "Eléctrico", "Cambio OF"]
    };

    const DEFS = ["ROTA", "BULTOS", "DIMENSIONES", "GOTA", "SUCIA", "MALLA", "FALLO IMP."];

    function setTab(n, btn) {
        document.querySelectorAll('.sect').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        btn.classList.add('active');
        if(n === 4) renderHistorial();
    }

    function parseLote(v) {
        if(v.length === 5) {
            db.reg.linea = v[0];
            db.reg.mes = v[1];
            db.reg.dia = v.substring(3,5);
            document.getElementById('lote-det').innerHTML = `<span>LÍNEA: ${db.reg.linea}</span><span>MES: ${db.reg.mes}</span><span>DÍA: ${db.reg.dia}</span>`;
        }
    }

    function sync() {
        if(!db.reg.pin) db.reg.lote = document.getElementById('f-lote').value;
        db.reg.h_cierre = document.getElementById('cfg-cierre').value;
        db.reg.cadencia = document.getElementById('cfg-cad').value;
        localStorage.setItem('decoline_v41', JSON.stringify(db));
        updateKPIs();
    }

    function updateKPIs() {
        let ok = parseInt(db.prod.ok) || 0;
        let noko = db.prod.noko;
        let total = ok + noko;
        let merma = total > 0 ? ((noko / total) * 100).toFixed(1) : 0;
        
        // Forecast Predictivo
        let ahora = new Date();
        let c = db.reg.h_cierre.split(':');
        let cierre = new Date(); cierre.setHours(c[0], c[1], 0);
        if(cierre < ahora) cierre.setDate(cierre.getDate() + 1);
        let minRest = (cierre - ahora) / 60000;
        let forecast = Math.round(ok + ((minRest / 60) * db.reg.cadencia * (1 - (merma/100))));

        document.getElementById('k-ok').innerText = ok;
        document.getElementById('k-merma').innerText = merma + "%";
        document.getElementById('k-forecast').innerText = forecast > ok ? forecast : ok;
        document.getElementById('v-ok-c').innerText = ok;
    }

    function openDef(tipo, zona) {
        document.getElementById('modal').style.display = 'flex';
        let ops = document.getElementById('m-ops'); ops.innerHTML = '';
        DEFS.forEach(d => {
            let b = document.createElement('button'); b.className = 'm-btn'; b.innerText = d;
            b.onclick = () => {
                if(tipo === 'R1') db.prod.r1++; else db.prod.noko++;
                db.prod.detalles.push({def: d, tipo: tipo, zona: zona, hora: new Date().toLocaleTimeString().substring(0,5), lote: db.reg.lote});
                sync(); closeModal();
            };
            ops.appendChild(b);
        });
    }

    function addP() {
        let h1 = document.getElementById('p-h1').value;
        let h2 = document.getElementById('p-h2').value;
        if(!h1 || !h2) return alert("¡Pon las horas!");
        let m = (parseInt(h2.split(':')[0])*60 + parseInt(h2.split(':')[1])) - (parseInt(h1.split(':')[0])*60 + parseInt(h1.split(':')[1]));
        db.paradas.push({est: document.getElementById('p-est').value, mot: document.getElementById('p-mot').value, min: m, h1, h2});
        sync(); alert("Parada Guardada");
    }

    function renderHistorial() {
        let l = document.getElementById('hist-lista'); l.innerHTML = '';
        db.prod.detalles.forEach((d, i) => {
            l.innerHTML += `<div class="hist-item"><span><b>${d.hora}</b> ${d.def} (${d.tipo})</span><button class="btn-del" onclick="delItem(${i}, 'det')">×</button></div>`;
        });
        db.paradas.forEach((p, i) => {
            l.innerHTML += `<div class="hist-item" style="color:var(--red)"><span><b>${p.h1}-${p.h2}</b> ${p.est}: ${p.mot}</span><button class="btn-del" onclick="delItem(${i}, 'par')">×</button></div>`;
        });
    }

    function delItem(i, tipo) {
        if(tipo === 'det') db.prod.detalles.splice(i, 1);
        else db.paradas.splice(i, 1);
        sync(); renderHistorial();
    }

    function togglePin() {
        db.reg.pin = !db.reg.pin;
        document.getElementById('btn-pin').style.background = db.reg.pin ? 'var(--orange)' : '#ddd';
        sync();
    }

    function updateMotivos(e) {
        let s = document.getElementById('p-mot'); s.innerHTML = '';
        MOTIVOS[e].forEach(m => { let o=document.createElement('option'); o.value=m; o.innerText=m; s.appendChild(o); });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function generarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(26, 35, 126); doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(18); doc.text("INFORME ESTRATÉGICO DECOLINE", 20, 22);
        doc.setTextColor(0); doc.setFontSize(10);
        doc.text(`OK Final: ${db.prod.ok} | Merma: ${document.getElementById('k-merma').innerText} | OEE Est: ${((1-(db.paradas.reduce((a,b)=>a+b.min,0)/480))*100).toFixed(1)}%`, 20, 45);
        
        doc.autoTable({ startY: 55, head: [['ESTACIÓN', 'MOTIVO', 'DURACIÓN']], body: db.paradas.map(p => [p.est, p.mot, p.min+' min']), headStyles: {fillColor:[198, 40, 40]} });
        doc.autoTable({ startY: doc.lastAutoTable.finalY+10, head: [['LOTE', 'DEFECTO', 'ZONA', 'TIPO']], body: db.prod.detalles.map(d => [d.lote, d.def, d.zona, d.tipo]), headStyles: {fillColor:[239, 108, 0]} });
        
        doc.save(`Decoline_Pro_V41.pdf`);
    }

    window.onload = () => {
        document.getElementById('f-lote').value = db.reg.lote;
        document.getElementById('cfg-cierre').value = db.reg.h_cierre;
        document.getElementById('cfg-cad').value = db.reg.cadencia;
        document.getElementById('in-ok').value = db.prod.ok || '';
        updateMotivos('KERAJET');
        sync();
    };
</script>
</body>
</html>
