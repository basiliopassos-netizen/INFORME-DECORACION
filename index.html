<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFORME DE PRODUCCIÓN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f0f2f5; --info: #3498db; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; padding: 0; background: var(--bg); color: #2c3e50; min-height: 100vh; }
        .fixed-top { position: sticky; top: 0; z-index: 1000; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .logo-u { background: white; color: var(--primary); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; }
        .tabs { display: flex; background: #34495e; }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: rgba(255,255,255,0.1); }
        .contenido { padding: 12px; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 8px; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: 800; color: #7f8c8d; margin-bottom: 3px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid #dce1e5; border-radius: 10px; font-size: 14px; width: 100%; background: #fff; }
        .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        .btn-main { flex: 1; border: none; border-radius: 18px; padding: 15px; color: white; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-edit { width: 55px; height: 90px; border: none; border-radius: 15px; background: #fff; border: 2px solid #dce1e5; color: var(--primary); font-size: 24px; }
        .btn-ok { background: var(--success); box-shadow: 0 5px 0 #1e8449; }
        .btn-nook { background: var(--danger); box-shadow: 0 5px 0 #b03a2e; }
        .btn-event { background: var(--info); box-shadow: 0 5px 0 #2980b9; margin-top: 10px; width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; }
        .num-big { font-size: 38px; font-weight: bold; line-height: 1; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #1a252f; color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .btn-finalizar { background: #007bff; color: white; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 20px; }
        .btn-reset { background: #95a5a6; color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 12px; margin-top: 30px; margin-bottom: 50px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; padding:25px; border-radius:25px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .defecto-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; background: #f8f9fa; border-left: 6px solid var(--danger); border-radius: 12px; text-align: left; font-weight: bold; font-size: 16px; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body onload="cargarDatos()">

<div id="loading"><h2>🚀 GENERANDO INFORME...</h2><p>Sumando tiempos por estación...</p></div>

<div class="fixed-top">
    <header>
        <div class="logo-u">U</div>
        <div style="font-weight: bold; font-size: 14px;">INFORME PRODUCCIÓN DECORACIÓN</div>
    </header>
    <div class="tabs">
        <button class="tab-btn active" id="btn-calidad" onclick="cambiarTab('calidad')">Calidad</button>
        <button class="tab-btn" id="btn-final" onclick="cambiarTab('final')">Final</button>
        <button class="tab-btn" id="btn-eventos" onclick="cambiarTab('eventos')">Eventos</button>
    </div>
</div>

<div class="contenido">
    <div class="card">
        <div class="grid-inputs">
            <div class="campo"><label>Fecha</label><input type="date" id="fecha" onchange="guardarDatos()"></div>
            <div class="campo"><label>Turno</label><select id="turno" onchange="guardarDatos()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
            <div class="campo"><label>OF</label><input type="text" id="of" placeholder="Nº Orden" oninput="guardarDatos()"></div>
            <div class="campo"><label>Gráfica</label><input type="text" id="grafica" placeholder="Nombre gráfica" oninput="guardarDatos()"></div>
            <div class="campo full-width"><label>Sustrato</label><input type="text" id="sustrato" placeholder="Sustrato..." oninput="guardarDatos()"></div>
        </div>
    </div>

    <div id="vista-produccion">
        <div class="control-row">
            <button class="btn-main btn-ok" onclick="sumarUno('ok')"><span>PIEZAS OK</span><span class="num-big" id="val-ok">0</span></button>
            <button class="btn-edit" onclick="editarManual('ok')">✎</button>
        </div>
        <div class="control-row">
            <button class="btn-main btn-nook" onclick="abrirDefectos()"><span>PIEZAS NO OK</span><span class="num-big" id="val-nook">0</span></button>
            <button class="btn-edit" onclick="editarManual('nook')">✎</button>
        </div>
        <div class="stats">
            <div class="stat-item"><span id="val-total" style="font-size:24px; font-weight:bold;">0</span><br><small>TOTAL</small></div>
            <div class="stat-item"><span id="val-pct" style="font-size:24px; font-weight:bold; color:var(--success);">0%</span><br><small>EFICIENCIA</small></div>
        </div>
    </div>

    <div id="vista-eventos" class="hidden">
        <div class="card">
            <h3 style="margin-top:0">Registro de Parada</h3>
            <div class="campo">
                <label>Estación</label>
                <select id="ev-estacion">
                    <option>HORNOS</option>
                    <option>ROBOTTIONS</option>
                    <option>CABINA 1</option>
                    <option>KERAJET</option>
                    <option>CABINA 2</option>
                </select>
            </div>
            <div class="grid-inputs">
                <div class="campo"><label>Inicio</label><input type="time" id="ev-inicio"></div>
                <div class="campo"><label>Fin</label><input type="time" id="ev-fin"></div>
            </div>
            <div class="campo">
                <label>Descripción</label>
                <textarea id="ev-desc" rows="2" placeholder="Causa..."></textarea>
            </div>
            <button class="btn-event" onclick="document.getElementById('cam-input-event').click()">📸 FOTO (OPCIONAL)</button>
            <p id="ev-foto-status" style="font-size:11px; color:var(--success); text-align:center; display:none;">✓ Foto cargada</p>
            <button class="btn-finalizar" style="background:var(--primary); margin-top:15px;" onclick="guardarEvento()">💾 GUARDAR PARADA</button>
        </div>
    </div>

    <button class="btn-finalizar" onclick="compartirInforme()">📤 GENERAR PDF</button>
    <button class="btn-reset" onclick="borrarTodo()">🗑️ LIMPIAR TURNO</button>
</div>

<div id="modal-app" class="modal"><div class="modal-box" id="modal-content"></div></div>
<input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="fotoProcesada(event)">
<input type="file" id="cam-input-event" accept="image/*" capture="environment" style="display:none" onchange="fotoEventoProcesada(event)">

<script>
    const config = { calidad: ["Bultos", "Malla suelta", "Rota", "Sucia"], final: ["Gota Kerajet", "Tono", "Rascada", "Manchada"] };
    let tabActual = 'calidad', pasoFoto = 0, defectoSeleccionado = "";
    let tempFotoEvento = null;
    let db = { calidad: { ok: 0, nook: 0, registros: [] }, final: { ok: 0, nook: 0, registros: [] }, eventos: [] };

    function guardarDatos() {
        const cab = { fecha: document.getElementById('fecha').value, turno: document.getElementById('turno').value, of: document.getElementById('of').value, grafica: document.getElementById('grafica').value, sustrato: document.getElementById('sustrato').value };
        localStorage.setItem('prod_db_v3', JSON.stringify(db));
        localStorage.setItem('cab_db_v3', JSON.stringify(cab));
    }

    function cargarDatos() {
        const dLocal = localStorage.getItem('prod_db_v3');
        const cLocal = localStorage.getItem('cab_db_v3');
        if (dLocal) db = JSON.parse(dLocal);
        if (cLocal) {
            const c = JSON.parse(cLocal);
            document.getElementById('fecha').value = c.fecha || "";
            document.getElementById('turno').value = c.turno || "Mañana";
            document.getElementById('of').value = c.of || "";
            document.getElementById('grafica').value = c.grafica || "";
            document.getElementById('sustrato').value = c.sustrato || "";
        } else { document.getElementById('fecha').valueAsDate = new Date(); }
        actualizarUI();
    }

    function borrarTodo() { if (confirm("¿Resetear turno?")) { localStorage.clear(); location.reload(); } }
    
    function cambiarTab(t) {
        tabActual = t;
        document.getElementById('btn-calidad').classList.toggle('active', t === 'calidad');
        document.getElementById('btn-final').classList.toggle('active', t === 'final');
        document.getElementById('btn-eventos').classList.toggle('active', t === 'eventos');
        document.getElementById('vista-produccion').classList.toggle('hidden', t === 'eventos');
        document.getElementById('vista-eventos').classList.toggle('hidden', t !== 'eventos');
        actualizarUI();
    }

    function sumarUno(tipo) { db[tabActual][tipo]++; actualizarUI(); guardarDatos(); }
    function editarManual(tipo) {
        let n = prompt("Total " + tipo.toUpperCase(), db[tabActual][tipo]);
        if (n !== null && !isNaN(n)) { db[tabActual][tipo] = parseInt(n || 0); actualizarUI(); guardarDatos(); }
    }

    function abrirDefectos() {
        const mc = document.getElementById('modal-content');
        mc.innerHTML = `<h3>Defecto</h3><div id="btns"></div><button onclick="cerrarModal()" style="width:100%;margin-top:10px;padding:10px;">Cerrar</button>`;
        config[tabActual].forEach(d => {
            mc.querySelector('#btns').innerHTML += `<button class="defecto-btn" onclick="iniciarFotos('${d}')">${d}</button>`;
        });
        document.getElementById('modal-app').style.display = 'flex';
    }

    function iniciarFotos(d) { defectoSeleccionado = d; pasoFoto = 1; mostrarPasoFoto(); }
    function mostrarPasoFoto() {
        const mc = document.getElementById('modal-content');
        mc.innerHTML = `<h3>${pasoFoto === 1 ? "📸 FOTO DEFECTO" : "📸 FOTO LOTE"}</h3><button class="defecto-btn" onclick="document.getElementById('cam-input').click()">ABRIR CÁMARA</button>`;
    }

    function fotoProcesada(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            if(pasoFoto === 1) {
                db[tabActual].nook++;
                db[tabActual].registros.push({ defecto: defectoSeleccionado, hora: new Date().toLocaleTimeString(), foto1: ev.target.result, foto2: null });
                pasoFoto = 2; mostrarPasoFoto();
            } else {
                db[tabActual].registros[db[tabActual].registros.length - 1].foto2 = ev.target.result;
                cerrarModal(); actualizarUI(); guardarDatos();
            }
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function fotoEventoProcesada(e) {
        const r = new FileReader();
        r.onload = (ev) => { tempFotoEvento = ev.target.result; document.getElementById('ev-foto-status').style.display = 'block'; };
        r.readAsDataURL(e.target.files[0]);
    }

    function guardarEvento() {
        const est = document.getElementById('ev-estacion').value, ini = document.getElementById('ev-inicio').value, fin = document.getElementById('ev-fin').value, desc = document.getElementById('ev-desc').value;
        if (!ini || !fin || !desc) return alert("Faltan datos");
        const [h1, m1] = ini.split(':').map(Number), [h2, m2] = fin.split(':').map(Number);
        let d1 = new Date(), d2 = new Date(); d1.setHours(h1, m1, 0); d2.setHours(h2, m2, 0);
        if (d2 < d1) d2.setDate(d2.getDate() + 1);
        const mins = Math.floor((d2 - d1) / 60000);
        db.eventos.push({ estacion: est, inicio: ini, fin: fin, desc: desc, foto: tempFotoEvento, minutos: mins });
        tempFotoEvento = null; document.getElementById('ev-foto-status').style.display = 'none';
        guardarDatos(); alert("Guardado");
    }

    function cerrarModal() { document.getElementById('modal-app').style.display = 'none'; }

    function actualizarUI() {
        const d = db[tabActual]; if(!d) return;
        document.getElementById('val-ok').innerText = d.ok;
        document.getElementById('val-nook').innerText = d.nook;
        const total = d.ok + d.nook;
        document.getElementById('val-total').innerText = total;
        document.getElementById('val-pct').innerText = total > 0 ? ((d.ok / total) * 100).toFixed(1) + "%" : "0%";
    }

    async function compartirInforme() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        document.getElementById('loading').style.display = 'flex';
        const of = document.getElementById('of').value || "S/N", tur = document.getElementById('turno').value, fec = document.getElementById('fecha').value;

        // Cabecera
        doc.setFontSize(16); doc.text("INFORME DE PRODUCCIÓN", 20, 20);
        doc.setFontSize(10); doc.text(`OF: ${of} | Turno: ${tur} | Fecha: ${fec}`, 20, 28);
        doc.line(20, 32, 190, 32);

        // RESUMEN GENERAL
        doc.text(`PIEZAS CALIDAD: OK: ${db.calidad.ok} | NO OK: ${db.calidad.nook}`, 20, 40);
        doc.text(`PIEZAS FINAL:   OK: ${db.final.ok}   | NO OK: ${db.final.nook}`, 20, 46);
        const totalMins = db.eventos.reduce((a, b) => a + b.minutos, 0);
        doc.setTextColor(200, 0, 0);
        doc.text(`TIEMPO TOTAL PERDIDO: ${totalMins} MINUTOS`, 20, 54);
        doc.setTextColor(0);

        // --- RESUMEN POR ESTACIÓN ---
        doc.setFontSize(12); doc.text("RESUMEN POR ESTACIÓN:", 20, 65);
        const resEst = {};
        db.eventos.forEach(e => {
            if(!resEst[e.estacion]) resEst[e.estacion] = { min: 0, cant: 0 };
            resEst[e.estacion].min += e.minutos; resEst[e.estacion].cant += 1;
        });
        doc.setFontSize(10);
        let yRes = 72;
        for (const s in resEst) {
            doc.text(`- ${s}: ${resEst[s].cant} paradas | Total: ${resEst[s].min} min.`, 25, yRes);
            yRes += 6;
        }
        doc.line(20, yRes + 4, 190, yRes + 4);
        let y = yRes + 15;

        // Fallos y Eventos (Listado)
        const addSect = (tit, regs) => {
            if (regs.length === 0) return;
            if (y > 250) { doc.addPage(); y = 20; }
            doc.setFontSize(14); doc.text(tit, 20, y); y += 10;
            regs.forEach(r => {
                if (y > 220) { doc.addPage(); y = 20; }
                doc.setFontSize(9); doc.text(`${r.defecto || r.estacion} (${r.hora || r.inicio})`, 20, y);
                if(r.foto1 || r.foto) doc.addImage(r.foto1 || r.foto, 'JPEG', 20, y+2, 70, 45);
                if(r.foto2) doc.addImage(r.foto2, 'JPEG', 95, y+2, 70, 45);
                y += (r.foto1 || r.foto) ? 55 : 10;
            });
        };
        addSect("DETALLE FALLOS CALIDAD", db.calidad.registros);
        addSect("DETALLE FALLOS FINAL", db.final.registros);
        addSect("LISTADO DE PARADAS", db.eventos);

        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], `Informe_${of}.pdf`, { type: 'application/pdf' });
        document.getElementById('loading').style.display = 'none';
        if (navigator.share) await navigator.share({ files: [file] }); else doc.save(`Informe_${of}.pdf`);
    }
</script>
</body>
</html>
