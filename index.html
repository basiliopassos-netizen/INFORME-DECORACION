<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V33 - ANALÍTICA EQUIPOS (OCR)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --r1: #f39c12; --ko: #e74c3c; --bg: #f4f7f6; --info: #3498db; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #34495e; position: sticky; top:0; z-index:100; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; font-size: 9px; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--r1); background: rgba(255,255,255,0.1); }
        .contenido { padding: 10px; }
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; border: 1px solid #eee; }
        .fila-contador { display: flex; gap: 6px; margin-bottom: 10px; }
        .btn-count { flex: 1; border: none; border-radius: 14px; padding: 10px; color: white; min-height: 70px; font-weight: bold; }
        .btn-ok { background: var(--success); } .btn-r1 { background: var(--r1); } .btn-ko { background: var(--ko); }
        .resumen-seccion { margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 12px; border-left: 5px solid var(--primary); }
        .stats-equipo { display: flex; justify-content: space-around; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .stat-box { text-align: center; font-size: 11px; }
        .stat-box b { display: block; font-size: 16px; color: var(--ko); }
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:5000; flex-direction: column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .btn-action { background: #007bff; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:92%; padding:15px; border-radius:15px; }
    </style>
</head>
<body onload="cargarTodo()">

<div id="loading">
    <div id="loading-icon" style="font-size:40px">🔍</div>
    <h3 id="load-text">ANALIZANDO LOTE...</h3>
    <p>Buscando código de equipo (T1/T2/T3)</p>
</div>

<header><b>PROD V33</b> <span style="font-size:10px;">ANALÍTICA EQUIPOS</span></header>

<div class="tabs">
    <button class="tab-btn active" id="btn-calidad" onclick="cambiarTab('calidad')">CALIDAD (CRU)</button>
    <button class="tab-btn" id="btn-final" onclick="cambiarTab('final')">FINAL (EMB)</button>
    <button class="tab-btn" id="btn-resumen" onclick="cambiarTab('resumen')">📊 RESUMEN</button>
</div>

<div class="contenido">
    <div id="vistas-principales">
        <div class="card">
            <label>OF (Orden de Fab.)</label>
            <input type="text" id="of" placeholder="Ej: 45001" oninput="guardarTodo()">
        </div>

        <div class="fila-contador">
            <button class="btn-count btn-ok" onclick="sumarUno('ok')">OK <br><span id="val-ok">0</span></button>
        </div>
        <div class="fila-contador">
            <button class="btn-count btn-r1" onclick="abrirDefectos('r1')">REPROCESO R1 <br><span id="val-r1">0</span></button>
        </div>
        <div class="fila-contador">
            <button class="btn-count btn-ko" onclick="abrirDefectos('ko')">TOTAL KO <br><span id="val-ko">0</span></button>
        </div>
    </div>

    <div id="vista-resumen" class="hidden">
        <div id="resumen-lista"></div>
        <button class="btn-action" onclick="generarPDF()">📤 INFORME PDF</button>
    </div>
</div>

<div id="modal-app" class="modal"><div class="modal-box" id="modal-content"></div></div>
<input type="file" id="in-cam" accept="image/*" capture="environment" style="display:none" onchange="procesarFoto(event)">

<script>
    const CONFIG = {
        calidad: { r1: ["Bultos", "Manchada", "1 malla suelta"], ko: ["Rota", "Malla suelta", "Playa"] },
        final: { r1: ["Gota Kerajet", "Rascada", "Fallo Matificación"], ko: ["Rota", "Mallas sueltas", "Fallo Flawmaster"] }
    };
    
    let db = { 
        calidad: { ok: 0, r1: 0, ko: 0, registros: [] }, 
        final: { ok: 0, r1: 0, ko: 0, registros: [] }, 
        cabecera: { of: "" } 
    };
    
    let tabActual = 'calidad', pasoFoto = 1, defectoActivo = "", valoracionActiva = "", equipoDetectado = "S/D";

    function guardarTodo() { 
        db.cabecera.of = document.getElementById('of').value;
        localStorage.setItem('PROD_V33', JSON.stringify(db));
        actualizarResumenUI();
    }

    function cargarTodo() { 
        const g = localStorage.getItem('PROD_V33'); 
        if(g) db = JSON.parse(g); 
        document.getElementById('of').value = db.cabecera.of || "";
        actualizarUI();
    }

    function cambiarTab(t) { 
        tabActual = t; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        document.getElementById('btn-'+t).classList.add('active'); 
        document.getElementById('vistas-principales').classList.toggle('hidden', t === 'resumen'); 
        document.getElementById('vista-resumen').classList.toggle('hidden', t !== 'resumen'); 
        actualizarUI(); 
    }

    function sumarUno(tipo) { db[tabActual][tipo]++; actualizarUI(); guardarTodo(); }

    function abrirDefectos(tipoVal) {
        valoracionActiva = tipoVal;
        let h = `<h3>Motivo ${tipoVal.toUpperCase()}</h3>`;
        CONFIG[tabActual][tipoVal].forEach(d => {
            h += `<button class="btn-action" style="background:#f8f9fa; color:black; border:1px solid #ddd;" onclick="seleccionarDefecto('${d}')">${d}</button>`;
        });
        document.getElementById('modal-content').innerHTML = h;
        document.getElementById('modal-app').style.display = 'flex';
    }

    function seleccionarDefecto(d) { defectoActivo = d; pasoFoto = 1; abrirFoto(); }

    function abrirFoto() {
        let msg = pasoFoto === 1 ? "Foto del DEFECTO" : "Foto del LOTE (Lectura T1/T2/T3)";
        document.getElementById('modal-content').innerHTML = `<h3>${msg}</h3><button class="btn-action" onclick="document.getElementById('in-cam').click()">CÁMARA</button>`;
        document.getElementById('modal-app').style.display = 'flex';
    }

    async function procesarFoto(e) {
        if(!e.target.files[0]) return;
        document.getElementById('loading').style.display = 'flex';
        
        const reader = new FileReader();
        reader.onload = async (f) => {
            const img = new Image();
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX = 800; let w = img.width, h = img.height;
                if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                if(pasoFoto === 1) {
                    db[tabActual].registros.push({ val: valoracionActiva, defecto: defectoActivo, equipo: "S/D", foto1: dataUrl });
                    pasoFoto = 2;
                    document.getElementById('loading').style.display = 'none';
                    abrirFoto();
                } else {
                    // SEGUNDA FOTO: ANALIZAR LOTE CON OCR
                    document.getElementById('load-text').innerText = "LEYENDO CÓDIGO...";
                    const { data: { text } } = await Tesseract.recognize(dataUrl, 'eng');
                    
                    let equipo = "S/D";
                    if (text.toUpperCase().includes("T1")) equipo = "T1";
                    else if (text.toUpperCase().includes("T2")) equipo = "T2";
                    else if (text.toUpperCase().includes("T3")) equipo = "T3";

                    db[tabActual].registros[db[tabActual].registros.length - 1].equipo = equipo;
                    db[tabActual][valoracionActiva]++;
                    
                    document.getElementById('loading').style.display = 'none';
                    if(equipo === "S/D") {
                        pedirEquipoManual();
                    } else {
                        cerrarModal();
                        actualizarUI();
                        guardarTodo();
                    }
                }
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function pedirEquipoManual() {
        document.getElementById('modal-content').innerHTML = `
            <h3>Lote no detectado</h3>
            <p>¿Qué equipo fabricó esta pieza?</p>
            <button class="btn-action" style="background:#34495e" onclick="setEquipoManual('T1')">EQUIPO T1</button>
            <button class="btn-action" style="background:#34495e" onclick="setEquipoManual('T2')">EQUIPO T2</button>
            <button class="btn-action" style="background:#34495e" onclick="setEquipoManual('T3')">EQUIPO T3</button>
        `;
    }

    function setEquipoManual(eq) {
        db[tabActual].registros[db[tabActual].registros.length - 1].equipo = eq;
        cerrarModal(); actualizarUI(); guardarTodo();
    }

    function actualizarResumenUI() {
        let h = `<h3>📊 RESUMEN ANALÍTICO</h3>`;
        
        // Función para contar fallos por equipo
        const contarPorEquipo = (zona) => {
            let counts = { T1: 0, T2: 0, T3: 0, "S/D": 0 };
            db[zona].registros.forEach(r => { if(r.val !== 'ok') counts[r.equipo]++; });
            return counts;
        };

        const calCounts = contarPorEquipo('calidad');
        h += `<div class="resumen-seccion">
                <b>FALLOS ZONA CALIDAD (POR EQUIPO)</b>
                <div class="stats-equipo">
                    <div class="stat-box">T1 <b>${calCounts.T1}</b></div>
                    <div class="stat-box">T2 <b>${calCounts.T2}</b></div>
                    <div class="stat-box">T3 <b>${calCounts.T3}</b></div>
                </div>
              </div>`;

        const finCounts = contarPorEquipo('final');
        h += `<div class="resumen-seccion" style="border-left-color:var(--info)">
                <b>FALLOS ZONA FINAL (POR EQUIPO)</b>
                <div class="stats-equipo">
                    <div class="stat-box">T1 <b>${finCounts.T1}</b></div>
                    <div class="stat-box">T2 <b>${finCounts.T2}</b></div>
                    <div class="stat-box">T3 <b>${finCounts.T3}</b></div>
                </div>
              </div>`;

        document.getElementById('resumen-lista').innerHTML = h;
    }

    function actualizarUI() {
        document.getElementById('val-ok').innerText = db[tabActual].ok;
        document.getElementById('val-r1').innerText = db[tabActual].r1;
        document.getElementById('val-ko').innerText = db[tabActual].ko;
        actualizarResumenUI();
    }

    function cerrarModal() { document.getElementById('modal-app').style.display = 'none'; }

</script>
</body>
</html>
