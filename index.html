<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decoline V43 - Nexus Master Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #1a237e; --green: #2e7d32; --red: #c62828; --orange: #ef6c00; --gray: #f4f7f6; --sidebar-w: 75px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-w); background: var(--blue); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 10px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 1001; }
        .side-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 22px; cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 15px; width: 60px; text-align: center; }
        .side-btn.active { color: white; background: rgba(255,255,255,0.2); }
        .side-label { font-size: 8px; display: block; margin-top: 4px; font-weight: bold; text-transform: uppercase; }

        .main { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .sect { display: none; }
        .sect.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .kpi-box { background: linear-gradient(135deg, var(--blue), #311b92); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .kpi-mini { background: white; padding: 10px; border-radius: 15px; text-align: center; border: 1px solid #ddd; }
        
        .card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; color: var(--blue); font-size: 14px; border-left: 4px solid var(--blue); padding-left: 10px; text-transform: uppercase; }
        
        label { font-weight: bold; font-size: 12px; color: #666; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        .grid-sem { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .sem-btn { padding: 15px 5px; border-radius: 15px; border: 2px solid; background: white; font-weight: bold; text-align: center; cursor: pointer; }
        
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; }
        .m-content { background:white; width:90%; border-radius:25px; padding:20px; max-height: 80vh; overflow-y: auto; }
        .m-btn { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; width: 100%; margin-bottom: 10px; border-radius: 12px; font-weight: bold; text-align: left; }
        
        .hist-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; display: flex; justify-content: space-between; }
        .btn-save { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="side-btn active" onclick="setTab(0, this)">🏠<span class="side-label">DASH</span></button>
    <button class="side-btn" onclick="setTab(1, this)">🔍<span class="side-label">CALID</span></button>
    <button class="side-btn" onclick="setTab(2, this)">📦<span class="side-label">EMBAL</span></button>
    <button class="side-btn" onclick="setTab(3, this)">⚠️<span class="side-label">PARAD</span></button>
    <button class="side-btn" onclick="setTab(4, this)">📝<span class="side-label">HIST</span></button>
    <button class="side-btn" onclick="setTab(5, this)">⚙️<span class="side-label">MAEST</span></button>
</div>

<div class="main">
    <div id="tab0" class="sect active">
        <div class="kpi-box">
            <span style="font-size:10px; text-transform:uppercase; opacity:0.8;">Proyección Cierre Turno</span>
            <div style="font-size:36px; font-weight:bold;" id="dash-forecast">0</div>
        </div>
        <div class="kpi-grid">
            <div class="kpi-mini">
                <span style="font-size:9px; color:#888;">TOTAL OK</span>
                <div style="font-size:18px; font-weight:bold; color:var(--green);" id="dash-ok">0</div>
            </div>
            <div class="kpi-mini">
                <span style="font-size:9px; color:#888;">MERMA TOT.</span>
                <div style="font-size:18px; font-weight:bold; color:var(--red);" id="dash-merma">0%</div>
            </div>
        </div>
        <div class="card">
            <h3>LOTE ADN MANUAL</h3>
            <input type="text" id="f-lote" placeholder="Escribir lote (ej: 1CC25)" oninput="syncLote(this.value)">
            <div id="adn-display" style="font-size:11px; margin-top:10px; color:var(--blue); display:flex; justify-content:space-around; font-weight:bold;">
                <span>LÍNEA: -</span><span>MES: -</span><span>DÍA: -</span>
            </div>
        </div>
    </div>

    <div id="tab1" class="sect">
        <div class="card">
            <h3>ZONA CONTROL CALIDAD SUSTRATO</h3>
            <div class="grid-sem">
                <div class="sem-btn" style="border-color:var(--green); color:var(--green)">OK<span id="v-cal-ok" style="display:block; font-size:20px;">0</span></div>
                <div class="sem-btn" style="border-color:var(--orange); color:var(--orange)" onclick="openModal('R1', 'SUSTRATO')">R1<span id="v-cal-r1" style="display:block;">0</span></div>
                <div class="sem-btn" style="border-color:var(--red); color:var(--red)" onclick="openModal('NO OK', 'SUSTRATO')">NO OK<span id="v-cal-no" style="display:block;">0</span></div>
            </div>
            <label>PIEZAS OK SUSTRATO</label>
            <input type="number" id="in-cal-ok" placeholder="Acumulado..." oninput="db.cal.ok=parseInt(this.value)||0; sync();">
        </div>
    </div>

    <div id="tab2" class="sect">
        <div class="card">
            <h3>ZONA EMBALAJE FINAL</h3>
            <div class="grid-sem">
                <div class="sem-btn" style="border-color:var(--green); color:var(--green)">OK<span id="v-emb-ok" style="display:block; font-size:20px;">0</span></div>
                <div class="sem-btn" style="border-color:var(--orange); color:var(--orange)" onclick="openModal('R1', 'EMBALAJE')">R1<span id="v-emb-r1" style="display:block;">0</span></div>
                <div class="sem-btn" style="border-color:var(--red); color:var(--red)" onclick="openModal('NO OK', 'EMBALAJE')">NO OK<span id="v-emb-no" style="display:block;">0</span></div>
            </div>
            <label>PIEZAS OK EMBALAJE</label>
            <input type="number" id="in-emb-ok" placeholder="Acumulado..." oninput="db.emb.ok=parseInt(this.value)||0; sync();">
        </div>
    </div>

    <div id="tab3" class="sect">
        <div class="card">
            <h3>ESTACIÓN / EVENTO</h3>
            <label>ESTACIÓN</label>
            <select id="p-est">
                <option>LGV</option><option>ROBOTIONS</option><option>CEPILLADORA</option><option>CABINA 1</option><option>HORNOS</option><option>ERRECE</option><option>KERAJET</option><option>UV</option><option>TRASLOW</option><option>CABINA 2</option><option>EMBALAJE</option>
            </select>
            <div style="display:flex; gap:10px; margin-top:10px;"><input type="time" id="p-h1"><input type="time" id="p-h2"></div>
            <textarea id="p-obs" placeholder="Motivo de la parada..." style="width:100%; margin-top:10px; height:60px;"></textarea>
            <button class="btn-save" onclick="addParada()">GUARDAR EVENTO</button>
        </div>
    </div>

    <div id="tab4" class="sect">
        <div class="card"><h3>HISTORIAL DE EVENTOS</h3><div id="hist-content"></div></div>
    </div>

    <div id="tab5" class="sect">
        <div class="card">
            <h3>MAESTRO DE PRODUCCIÓN</h3>
            <label>INICIO TURNO</label><input type="time" id="cfg-h-ini" value="06:00" onchange="sync()">
            <label>CIERRE TURNO</label><input type="time" id="cfg-h-fin" value="14:00" onchange="sync()">
            <label>PIEZAS OBJETIVO / HORA</label><input type="number" id="cfg-cad" value="650" onchange="sync()">
        </div>
    </div>
</div>

<div id="modal">
    <div class="m-content"><h3 id="m-title">Defecto</h3><div id="m-ops"></div><button class="btn-save" style="background:#888" onclick="closeM()">CERRAR</button></div>
</div>

<script>
    var db = JSON.parse(localStorage.getItem('tanque_v43')) || {
        lote: '', cal: {ok:0, r1:0, no:0, hist:[]}, emb: {ok:0, r1:0, no:0, hist:[]},
        parad: [], cfg: {h_ini:'06:00', h_fin:'14:00', cad:650}
    };

    function setTab(n, btn) {
        document.querySelectorAll('.sect').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        btn.classList.add('active');
        if(n === 4) renderHistorial();
    }

    function syncLote(v) {
        db.lote = v;
        if(v.length >= 5) {
            document.getElementById('adn-display').innerHTML = `<span>LÍNEA: ${v[0]}</span><span>MES: ${v[1]}</span><span>DÍA: ${v.substring(3,5)}</span>`;
        }
        sync();
    }

    function sync() {
        db.cfg.h_ini = document.getElementById('cfg-h-ini').value;
        db.cfg.h_fin = document.getElementById('cfg-h-fin').value;
        db.cfg.cad = document.getElementById('cfg-cad').value;
        localStorage.setItem('tanque_v43', JSON.stringify(db));
        updateDashboard();
    }

    function updateDashboard() {
        let okTot = (parseInt(db.cal.ok)||0) + (parseInt(db.emb.ok)||0);
        let noTot = db.cal.no + db.emb.no;
        let merma = (okTot + noTot) > 0 ? ((noTot / (okTot + noTot)) * 100).toFixed(1) : 0;
        
        document.getElementById('v-cal-ok').innerText = db.cal.ok;
        document.getElementById('v-cal-r1').innerText = db.cal.r1;
        document.getElementById('v-cal-no').innerText = db.cal.no;
        document.getElementById('v-emb-ok').innerText = db.emb.ok;
        document.getElementById('v-emb-r1').innerText = db.emb.r1;
        document.getElementById('v-emb-no').innerText = db.emb.no;
        document.getElementById('dash-ok').innerText = okTot;
        document.getElementById('dash-merma').innerText = merma + "%";

        let ahora = new Date();
        let f = db.cfg.h_fin.split(':');
        let fin = new Date(); fin.setHours(f[0], f[1], 0);
        if(fin < ahora) fin.setDate(fin.getDate()+1);
        let minRest = (fin - ahora) / 60000;
        let forecast = Math.round(okTot + ((minRest/60) * db.cfg.cad * (1-(merma/100))));
        document.getElementById('dash-forecast').innerText = forecast > okTot ? forecast : okTot;
    }

    function openModal(tipo, zona) {
        document.getElementById('modal').style.display = 'flex';
        let ops = document.getElementById('m-ops'); ops.innerHTML = '';
        ["ROTA", "BULTOS", "DIMENSIONES", "GOTA", "SUCIA", "MALLA", "IMPRESIÓN", "OTRO"].forEach(d => {
            let b = document.createElement('button'); b.className = 'm-btn'; b.innerText = d;
            b.onclick = () => {
                let t = (zona === 'SUSTRATO') ? db.cal : db.emb;
                if(tipo === 'R1') t.r1++; else t.no++;
                t.hist.push({def: d, tipo: tipo, hora: new Date().toLocaleTimeString().substring(0,5), lote: db.lote});
                sync(); closeM();
            };
            ops.appendChild(b);
        });
    }

    function addParada() {
        let h1 = document.getElementById('p-h1').value, h2 = document.getElementById('p-h2').value;
        if(!h1 || !h2) return alert("¡Pon horas!");
        let m = (parseInt(h2.split(':')[0])*60 + parseInt(h2.split(':')[1])) - (parseInt(h1.split(':')[0])*60 + parseInt(h1.split(':')[1]));
        db.parad.push({est: document.getElementById('p-est').value, h1, h2, min: m, obs: document.getElementById('p-obs').value});
        document.getElementById('p-obs').value = ''; sync(); alert("Guardado");
    }

    function renderHistorial() {
        let div = document.getElementById('hist-content'); div.innerHTML = '';
        db.cal.hist.concat(db.emb.hist).forEach(h => { div.innerHTML += `<div class="hist-item"><span><b>${h.hora}</b> ${h.def} (${h.tipo}) - Lote: ${h.lote}</span></div>`; });
        db.parad.forEach(p => { div.innerHTML += `<div class="hist-item" style="color:var(--red)"><span><b>${p.h1}-${p.h2}</b> ${p.est}: ${p.obs}</span></div>`; });
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    window.onload = () => {
        document.getElementById('f-lote').value = db.lote;
        document.getElementById('in-cal-ok').value = db.cal.ok || '';
        document.getElementById('in-emb-ok').value = db.emb.ok || '';
        document.getElementById('cfg-h-ini').value = db.cfg.h_ini;
        document.getElementById('cfg-h-fin').value = db.cfg.h_fin;
        document.getElementById('cfg-cad').value = db.cfg.cad;
        sync();
    };
</script>
</body>
</html>
