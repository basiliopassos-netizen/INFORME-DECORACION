<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V53 - SUMA DIRECTA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --warning: #eab308; --danger: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 16px; color: var(--accent); text-transform: uppercase; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 70px; }
        .nav-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 10px; font-weight: bold; color: var(--text); opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); border-top: 3px solid var(--accent); }
        .container { padding: 12px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        input, select, textarea { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; color: white; font-size: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-count { border: none; border-radius: 10px; padding: 15px 5px; font-weight: bold; text-align: center; color: white; min-height: 80px; }
        .btn-count b { font-size: 20px; display: block; margin-bottom: 5px; }
        .photo-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; margin: 2px; border: 1px solid var(--accent); }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body onload="init()">

<header><h1 id="header-title">DATOS PRINCIPALES</h1></header>

<div class="container">
    <div id="t-inicio" class="content">
        <div class="card">
            <input type="date" id="fecha" onchange="g()">
            <div style="display:flex; gap:8px;">
                <select id="equipo" onchange="g()"><option>T1</option><option>T2</option><option>T3</option></select>
                <select id="turno" onchange="g()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select>
            </div>
            <input type="text" id="of" placeholder="Nº OF" oninput="g()">
            <input type="text" id="sap" placeholder="Código SAP" oninput="g()">
            <input type="text" id="modelo" placeholder="Modelo" oninput="g()">
        </div>
    </div>

    <div id="t-crudo" class="content hidden">
        <div class="card">
            <div class="grid-3">
                <button class="btn-count" style="background:var(--success)" onclick="addPieza('c','ok')"><b>OK</b><span id="c-ok">0</span></button>
                <button class="btn-count" style="background:var(--warning); color:black" onclick="addPieza('c','r1')"><b>R1</b><span id="c-r1">0</span></button>
                <button class="btn-count" style="background:var(--danger)" onclick="addPieza('c','ko')"><b>KO</b><span id="c-ko">0</span></button>
            </div>
            <div id="pics-c" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
        </div>
    </div>

    <div id="t-final" class="content hidden">
        <div class="card">
            <div class="grid-3">
                <button class="btn-count" style="background:var(--success)" onclick="addPieza('f','ok')"><b>OK</b><span id="f-ok">0</span></button>
                <button class="btn-count" style="background:var(--warning); color:black" onclick="addPieza('f','r1')"><b>R1</b><span id="f-r1">0</span></button>
                <button class="btn-count" style="background:var(--danger)" onclick="addPieza('f','ko')"><b>KO</b><span id="f-ko">0</span></button>
            </div>
            <div id="pics-f" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
        </div>
    </div>

    <div id="t-paradas" class="content hidden">
        <div id="est-list"></div>
        <div class="card">
            <label>PARADA MANUAL</label>
            <div style="display:flex; gap:5px;"><input type="time" id="m-i"> <input type="time" id="m-f"></div>
            <textarea id="m-o" placeholder="Motivo..."></textarea>
            <button class="btn-action" onclick="saveM()">GUARDAR</button>
        </div>
    </div>

    <div id="t-resumen" class="content hidden">
        <div class="card" id="res-txt" style="white-space:pre-wrap; font-size:12px;"></div>
        <button class="btn-action" style="background:#25d366; color:white;" onclick="enviarWA()">WHATSAPP</button>
        <button class="btn-action" style="background:#ef4444; color:white;" onclick="generarPDF()">PDF CON FOTOS</button>
        <button class="btn-action" style="background:#64748b; color:white;" onclick="borrarTodo()">BORRAR TODO</button>
    </div>
</div>

<input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="procPhoto(event)">

<nav>
    <button class="nav-btn active" onclick="tab('inicio',this,'DATOS PRINCIPALES')">INICIO</button>
    <button class="nav-btn" onclick="tab('crudo',this,'CALIDAD CRUDO')">CRUDO</button>
    <button class="nav-btn" onclick="tab('final',this,'FINAL EMBALAJE')">FINAL</button>
    <button class="nav-btn" onclick="tab('paradas',this,'PARADAS')">PARADAS</button>
    <button class="nav-btn" onclick="tab('resumen',this,'INFORME FINAL')">INFORME</button>
</nav>

<script>
    const ests = ["KERAJET", "SMALTEC", "PRENSAS", "SECADERO", "MECÁNICO"];
    let db = { 
        of:'', sap:'', modelo:'', equipo:'T1', turno:'Mañana',
        c:{ok:0, r1:0, ko:0, fotos:[], logs:[]}, f:{ok:0, r1:0, ko:0, fotos:[], logs:[]},
        p: {}, s: {}, l: [] 
    };
    let curZ = '';

    function init() {
        const local = localStorage.getItem('PROD_V53_FINAL');
        if(local) db = JSON.parse(local);
        ests.forEach(e => { if(!db.p[e]) db.p[e]=0; });
        renderEst();
        r();
    }

    function tab(id, btn, tit) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('t-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('header-title').innerText = tit;
        if(id === 'resumen') buildRes();
    }

    function addPieza(z, t) {
        // SUMA PRIMERO
        db[z][t]++;
        curZ = z;
        
        if(t !== 'ok') {
            const m = prompt("Motivo defecto:", "Gotas");
            if(m) {
                db[z].logs.push({t: t.toUpperCase(), m: m, h: new Date().toLocaleTimeString()});
                if(confirm("¿Añadir foto?")) document.getElementById('cam').click();
            }
        }
        r(); g();
    }

    function procPhoto(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { db[curZ].fotos.push(ev.target.result); r(); g(); };
        reader.readAsDataURL(file);
    }

    function renderEst() {
        document.getElementById('est-list').innerHTML = ests.map(e => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
                <b>${e}</b>
                <span id="tm-${e}" style="font-family:monospace; color:var(--danger); font-size:20px;">${fmt(db.p[e])}</span>
                <button onclick="tog('${e}')" id="bt-${e}" style="background:var(--success); border:none; padding:10px; border-radius:8px; font-weight:bold; width:70px;">PLAY</button>
            </div>
        `).join('');
    }

    function tog(e) {
        const b = document.getElementById('bt-'+e);
        if(!db.s[e]) {
            db.s[e] = Date.now();
            b.innerText = "STOP"; b.style.background = "var(--danger)";
        } else {
            let segs = Math.floor((Date.now() - db.s[e])/1000);
            db.p[e] += segs;
            const obs = prompt("Motivo:");
            db.l.push({h: new Date().toLocaleTimeString(), e: e, d: Math.floor(segs/60), o: obs || "S/M"});
            db.s[e] = null;
            b.innerText = "PLAY"; b.style.background = "var(--success)";
        }
        r(); g();
    }

    function saveM() {
        const i=document.getElementById('m-i').value, f=document.getElementById('m-f').value, o=document.getElementById('m-o').value;
        if(!i || !f) return alert("Falta hora");
        db.l.push({h: i+" a "+f, e: "LIBRETA", d: "-", o: o});
        r(); g(); alert("Guardado");
    }

    function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

    function r() {
        document.getElementById('of').value = db.of;
        document.getElementById('sap').value = db.sap;
        document.getElementById('modelo').value = db.modelo;
        ['ok','r1','ko'].forEach(t => {
            document.getElementById('c-'+t).innerText = db.c[t];
            document.getElementById('f-'+t).innerText = db.f[t];
        });
        document.getElementById('pics-c').innerHTML = db.c.fotos.map(f => `<img src="${f}" class="photo-preview">`).join('');
        document.getElementById('pics-f').innerHTML = db.f.fotos.map(f => `<img src="${f}" class="photo-preview">`).join('');
        ests.forEach(e => {
            const el = document.getElementById('tm-'+e);
            if(el) el.innerText = fmt(db.p[e]);
        });
    }

    function g() {
        db.of = document.getElementById('of').value;
        db.sap = document.getElementById('sap').value;
        db.modelo = document.getElementById('modelo').value;
        db.equipo = document.getElementById('equipo').value;
        db.turno = document.getElementById('turno').value;
        localStorage.setItem('PROD_V53_FINAL', JSON.stringify(db));
    }

    function buildRes() {
        let txt = `INFORME TURNO: ${db.equipo}\nOF: ${db.of}\nSAP: ${db.sap}\nMODELO: ${db.modelo}\n\n`;
        txt += `--- CRUDO ---\nOK: ${db.c.ok} | R1: ${db.c.r1} | KO: ${db.c.ko}\nDefectos: ${db.c.logs.length}\n\n`;
        txt += `--- FINAL ---\nOK: ${db.f.ok} | R1: ${db.f.r1} | KO: ${db.f.ko}\nDefectos: ${db.f.logs.length}\n\n`;
        txt += `--- PARADAS ---\n`;
        db.l.forEach(x => txt += `- [${x.h}] ${x.e}: ${x.o}\n`);
        document.getElementById('res-txt').innerText = txt;
    }

    function enviarWA() {
        const t = encodeURIComponent(document.getElementById('res-txt').innerText);
        window.open(`https://wa.me/?text=${t}`);
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 15;
        doc.setFontSize(14); doc.text("INFORME PRODUCCION - OF " + db.of, 10, y); y += 10;
        doc.setFontSize(10); doc.text("Modelo: " + db.modelo + " | SAP: " + db.sap, 10, y); y += 15;
        doc.text("CRUDO: OK " + db.c.ok + " R1 " + db.c.r1 + " KO " + db.c.ko, 10, y); y += 10;
        db.c.fotos.forEach(f => { if(y>250){doc.addPage(); y=20;} doc.addImage(f, 'JPEG', 10, y, 40, 40); y += 45; });
        if(y>240){doc.addPage(); y=20;}
        doc.text("FINAL: OK " + db.f.ok + " R1 " + db.f.r1 + " KO " + db.f.ko, 10, y); y += 10;
        db.f.fotos.forEach(f => { if(y>250){doc.addPage(); y=20;} doc.addImage(f, 'JPEG', 10, y, 40, 40); y += 45; });
        doc.save(`Informe_${db.of}.pdf`);
    }

    function borrarTodo() {
        if(confirm("¿Borrar todos los datos del turno actual?")) {
            localStorage.removeItem('PROD_V53_FINAL');
            location.reload();
        }
    }
</script>
</body>
</html>
