<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDAD DE DECORACIÓN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --bg: #f0f2f5; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        /* Permitimos que el cuerpo haga scroll si es necesario, pero fijamos la cabecera */
        body { margin: 0; padding: 0; background: var(--bg); color: #2c3e50; min-height: 100vh; }

        /* CABECERA FIJA ARRIBA */
        .fixed-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        
        .logo-u { 
            background: white; 
            color: var(--primary); 
            width: 35px; 
            height: 35px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 22px;
        }

        .tabs { display: flex; background: #34495e; }
        .tab-btn { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            background: transparent; 
            color: #bdc3c7; 
            font-weight: bold; 
            font-size: 12px; 
            text-transform: uppercase;
        }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: rgba(255,255,255,0.1); }

        /* CONTENIDO - Ahora ajustado para que siempre se vea en el móvil */
        .contenido { 
            padding: 12px; 
            display: block; /* Asegura que no se oculte nada */
            width: 100%;
        }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 5px; }
        label { font-size: 10px; font-weight: 800; color: #7f8c8d; margin-bottom: 3px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #dce1e5; border-radius: 10px; font-size: 14px; width: 100%; background: #fff; }

        .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        /* BOTONES PRINCIPALES */
        .btn-main { 
            flex: 1; 
            border: none; 
            border-radius: 18px; 
            padding: 15px; 
            color: white; 
            min-height: 90px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }
        .btn-edit { 
            width: 55px; 
            height: 90px; 
            border: none; 
            border-radius: 15px; 
            background: #fff; 
            border: 2px solid #dce1e5; 
            color: var(--primary); 
            font-size: 24px;
        }

        .btn-ok { background: var(--success); box-shadow: 0 5px 0 #1e8449; }
        .btn-nook { background: var(--danger); box-shadow: 0 5px 0 #b03a2e; }
        .num-big { font-size: 38px; font-weight: bold; line-height: 1; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #1a252f; color: white; padding: 15px; border-radius: 15px; text-align: center; }

        .btn-finalizar { 
            background: #007bff; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 20px; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-top: 20px;
            margin-bottom: 50px; /* Espacio para no chocar con el borde inferior del móvil */
        }

        /* MODALES */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; padding:25px; border-radius:25px; text-align: center; }
        .defecto-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; background: #f8f9fa; border-left: 6px solid var(--danger); border-radius: 12px; text-align: left; font-weight: bold; font-size: 16px; }

        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading"><h2>🚀 PROCESANDO...</h2></div>

<div class="fixed-top">
    <header>
        <div class="logo-u">U</div>
        <div style="font-weight: bold; font-size: 16px;">UNIDAD DE DECORACIÓN</div>
    </header>
    <div class="tabs">
        <button class="tab-btn active" id="btn-calidad" onclick="cambiarTab('calidad')">Calidad</button>
        <button class="tab-btn" id="btn-final" onclick="cambiarTab('final')">Final</button>
    </div>
</div>

<div class="contenido">
    <div class="card">
        <div class="grid-inputs">
            <div class="campo"><label>Fecha</label><input type="date" id="fecha"></div>
            <div class="campo"><label>Turno</label><select id="turno"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
            <div class="campo"><label>OF</label><input type="text" id="of" placeholder="Nº Orden"></div>
            <div class="campo"><label>Sustrato</label><input type="text" id="sustrato" placeholder="Tipo..."></div>
        </div>
    </div>

    <div class="control-row">
        <button class="btn-main btn-ok" onclick="sumarUno('ok')">
            <span style="font-size:10px; font-weight:bold;">PIEZAS OK</span>
            <span class="num-big" id="val-ok">0</span>
        </button>
        <button class="btn-edit" onclick="editarManual('ok')">✎</button>
    </div>

    <div class="control-row">
        <button class="btn-main btn-nook" onclick="abrirDefectos()">
            <span style="font-size:10px; font-weight:bold;">PIEZAS NO OK</span>
            <span class="num-big" id="val-nook">0</span>
        </button>
        <button class="btn-edit" onclick="editarManual('nook')">✎</button>
    </div>

    <div class="stats">
        <div class="stat-item"><span id="val-total" style="font-size:24px; font-weight:bold;">0</span><br><small>TOTAL</small></div>
        <div class="stat-item"><span id="val-pct" style="font-size:24px; font-weight:bold; color:var(--success);">0%</span><br><small>CALIDAD</small></div>
    </div>

    <button class="btn-finalizar" onclick="compartirInforme()">📤 GENERAR Y ENVIAR PDF</button>
</div>

<div id="modal-app" class="modal"><div class="modal-box" id="modal-content"></div></div>
<input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="fotoProcesada(event)">

<script>
    const config = { calidad: ["Bultos", "Malla suelta", "Rota", "Sucia"], final: ["Gota Kerajet", "Tono", "Rascada", "Manchada"] };
    let tabActual = 'calidad', pasoFoto = 0, defectoSeleccionado = "";
    let db = { calidad: { ok: 0, nook: 0, registros: [] }, final: { ok: 0, nook: 0, registros: [] } };

    function cambiarTab(t) {
        tabActual = t;
        document.getElementById('btn-calidad').classList.toggle('active', t === 'calidad');
        document.getElementById('btn-final').classList.toggle('active', t === 'final');
        actualizarUI();
    }

    function sumarUno(tipo) { db[tabActual][tipo]++; actualizarUI(); }

    function editarManual(tipo) {
        let n = prompt("Total " + tipo.toUpperCase(), db[tabActual][tipo]);
        if (n !== null && !isNaN(n)) { db[tabActual][tipo] = parseInt(n || 0); actualizarUI(); }
    }

    function abrirDefectos() {
        const mc = document.getElementById('modal-content');
        mc.innerHTML = `<h3>Selecciona Defecto</h3><div id="lista-btns"></div><button onclick="cerrarModal()" style="width:100%;margin-top:15px;padding:12px;border:none;background:#eee;border-radius:12px;">Cerrar</button>`;
        config[tabActual].forEach(d => {
            mc.querySelector('#lista-btns').innerHTML += `<button class="defecto-btn" onclick="iniciarFotos('${d}')">${d}</button>`;
        });
        document.getElementById('modal-app').style.display = 'flex';
    }

    function iniciarFotos(d) { defectoSeleccionado = d; pasoFoto = 1; mostrarPasoFoto(); }

    function mostrarPasoFoto() {
        const mc = document.getElementById('modal-content');
        mc.innerHTML = `<h3>${pasoFoto === 1 ? "📸 FOTO DEFECTO" : "📸 FOTO LOTE"}</h3><button class="defecto-btn" style="background:var(--primary);color:white;text-align:center" onclick="document.getElementById('cam-input').click()">ABRIR CÁMARA</button>`;
    }

    function fotoProcesada(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            if(pasoFoto === 1) {
                db[tabActual].nook++;
                db[tabActual].registros.push({ defecto: defectoSeleccionado, hora: new Date().toLocaleTimeString(), foto1: event.target.result, foto2: null });
                pasoFoto = 2; mostrarPasoFoto();
            } else {
                db[tabActual].registros[db[tabActual].registros.length - 1].foto2 = event.target.result;
                cerrarModal(); actualizarUI();
            }
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function cerrarModal() { document.getElementById('modal-app').style.display = 'none'; }

    function actualizarUI() {
        const d = db[tabActual];
        document.getElementById('val-ok').innerText = d.ok;
        document.getElementById('val-nook').innerText = d.nook;
        const total = d.ok + d.nook;
        document.getElementById('val-total').innerText = total;
        document.getElementById('val-pct').innerText = total > 0 ? ((d.ok / total) * 100).toFixed(1) + "%" : "0%";
    }

    async function compartirInforme() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        document.getElementById('loading').style.display = 'flex';
        doc.text("REPORTE CALIDAD", 20, 20);
        let y = 30;
        [...db.calidad.registros, ...db.final.registros].forEach(r => {
            if (y > 240) { doc.addPage(); y = 20; }
            doc.text(`${r.defecto} (${r.hora})`, 20, y);
            if(r.foto1) doc.addImage(r.foto1, 'JPEG', 20, y+5, 80, 50);
            if(r.foto2) doc.addImage(r.foto2, 'JPEG', 105, y+5, 80, 50);
            y += 60;
        });
        const pdf = doc.output('blob');
        const file = new File([pdf], `Reporte.pdf`, { type: 'application/pdf' });
        document.getElementById('loading').style.display = 'none';
        if (navigator.share) await navigator.share({ files: [file] }); else doc.save(`Reporte.pdf`);
    }
    document.getElementById('fecha').valueAsDate = new Date();
</script>
</body>
</html>
