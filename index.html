<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC DECORACIÓN</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=U&background=2c3e50&color=fff&size=512&font-size=0.6&v=2">
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=U&background=2c3e50&color=fff&size=512&font-size=0.6&v=2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --dark: #1a252f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 0; }
        .app-header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; gap: 12px; }
        .logo-u { background: white; color: var(--primary); width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .tabs { display: flex; background: #34495e; position: sticky; top: 0; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--warning); background: rgba(255,255,255,0.1); }
        .seccion { padding: 12px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid #e1e8ed; }
        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 8px; }
        label { font-size: 10px; font-weight: bold; color: var(--primary); margin-bottom: 3px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 14px; height: 42px; }
        .btn-principal { border: none; border-radius: 18px; padding: 15px; color: white; width: 100%; min-height: 110px; cursor: pointer; }
        .btn-ok { background: var(--success); box-shadow: 0 5px 0 #1e8449; margin-bottom: 10px; }
        .btn-nook { background: var(--danger); box-shadow: 0 5px 0 #b03a2e; }
        .num-btn { font-size: 50px; font-weight: bold; display: block; line-height: 1; }
        .label-btn { font-size: 12px; font-weight: bold; display: block; margin-bottom: 4px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: var(--dark); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-num { font-size: 26px; font-weight: bold; display: block; }
        .stat-label { font-size: 9px; opacity: 0.6; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        #pdf-content { position: absolute; left: -5000px; width: 600px; background: white; padding: 40px; }
    </style>
</head>
<body>

<div id="loading"><h2>🚀 ENVIANDO...</h2></div>

<div class="app-header">
    <div class="logo-u">U</div>
    <div style="font-weight: bold; font-size: 14px;">UNIDAD DE DECORACIÓN</div>
</div>

<div class="tabs">
    <button class="tab-btn active" id="t-calidad" onclick="verTab('calidad')">Calidad</button>
    <button class="tab-btn" id="t-final" onclick="verTab('final')">Final</button>
</div>

<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="procesarFoto(event)">

<div class="seccion">
    <div class="card">
        <div class="grid-datos">
            <div class="campo"><label>Fecha</label><input type="date" id="inp-fecha"></div>
            <div class="campo"><label>Turno</label><select id="inp-turno"><option>Mañana</option><option>Tarde</option><option>Noche</option></select></div>
            <div class="campo"><label>OF</label><input type="text" id="inp-of"></div>
            <div class="campo"><label>Sustrato</label><input type="text" id="inp-sustrato"></div>
        </div>
    </div>

    <div class="card">
        <button class="btn-principal btn-ok" onclick="sumar('ok', 1)">
            <span class="label-btn">PIEZAS OK</span>
            <span class="num-btn" id="txt-ok">0</span>
        </button>
        <button class="btn-principal btn-nook" onclick="abrirModalFallos()">
            <span class="label-btn">PIEZAS NO OK</span>
            <span class="num-btn" id="txt-nook">0</span>
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span class="stat-num" id="st-total">0</span><span class="stat-label">TOTAL</span></div>
        <div class="stat-box"><span class="stat-num" id="st-pct">0%</span><span class="stat-label">RENDIMIENTO</span></div>
    </div>

    <button class="btn-principal" style="background:var(--primary); margin-top:15px; min-height:60px;" onclick="finalizarReporte()">🚀 GENERAR REPORTE</button>
</div>

<div id="modal-fallos" class="modal"><div class="modal-content"><h3 id="modal-titulo">Defecto</h3><div id="modal-body"></div></div></div>

<div id="pdf-content">
    <h1>REPORTE DE CALIDAD</h1>
    <p><b>OF:</b> <span id="pdf-of"></span> | <b>OK:</b> <span id="pdf-ok"></span> | <b>FALLOS:</b> <span id="pdf-nook"></span></p>
    <div id="pdf-fotos"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmEOnt3yEjiBgB-yHWOazs5s0XiYhZi5583_FoI60CZBZP4-B-BbOAJWXWxjMSANKv/exec";
    const defectologia = { calidad: ["Bultos", "Malla suelta", "Rota", "Sucia"], final: ["Gota Kerajet", "Tono", "Rascada", "Rota", "Manchada"] };
    let tabActual = 'calidad', pasoFoto = 0, db = { calidad: { ok: 0, nook: 0, fallos: {}, fotos: [] }, final: { ok: 0, nook: 0, fallos: {}, fotos: [] } };

    function verTab(t) { tabActual = t; actualizarUI(); }
    function sumar(tipo, n) { db[tabActual][tipo] = Math.max(0, db[tabActual][tipo] + n); actualizarUI(); }
    function abrirModalFallos() {
        pasoFoto = 0;
        const body = document.getElementById('modal-body'); body.innerHTML = '';
        defectologia[tabActual].forEach(f => {
            body.innerHTML += `<button onclick="iniciarDobleFoto('${f}')" style="width:100%; padding:15px; margin-bottom:10px;">${f}</button>`;
        });
        document.getElementById('modal-fallos').style.display = 'flex';
    }
    function iniciarDobleFoto(m) {
        db[tabActual].fallos[m] = (db[tabActual].fallos[m] || 0) + 1;
        db[tabActual].nook++; pasoFoto = 1;
        document.getElementById('modal-body').innerHTML = `<button onclick="document.getElementById('camera-input').click()" style="width:100%; padding:20px; background:black; color:white;">📸 CÁMARA</button>`;
    }
    function procesarFoto(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            db[tabActual].fotos.push(ev.target.result);
            if(pasoFoto === 1) { pasoFoto = 2; } else { document.getElementById('modal-fallos').style.display = 'none'; actualizarUI(); }
        };
        r.readAsDataURL(e.target.files[0]);
    }
    function actualizarUI() {
        const d = db[tabActual];
        document.getElementById('txt-ok').innerText = d.ok;
        document.getElementById('txt-nook').innerText = d.nook;
        const t = d.ok + d.nook;
        document.getElementById('st-total').innerText = t;
        document.getElementById('st-pct').innerText = t > 0 ? ((d.ok/t)*100).toFixed(1) + "%" : "0%";
    }
    async function finalizarReporte() {
        document.getElementById('loading').style.display = 'flex';
        // Simulación envío
        setTimeout(() => { alert("Reporte enviado"); document.getElementById('loading').style.display = 'none'; }, 2000);
    }
    window.onload = () => {
        document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];
        actualizarUI();
    };
</script>
</body>
</html>
