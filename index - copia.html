<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V51 - TOTAL CONTROL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --warning: #eab308; --danger: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; font-family: sans-serif; color: var(--text); }
        body { margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        nav { position: sticky; top: 0; background: var(--card); display: flex; overflow-x: auto; border-bottom: 2px solid var(--accent); z-index: 100; }
        .nav-btn { flex: 1; min-width: 85px; border: none; background: none; padding: 15px 5px; font-size: 10px; font-weight: bold; opacity: 0.6; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .container { padding: 12px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, textarea { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 15px; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-c { border: none; border-radius: 10px; padding: 20px 5px; font-weight: bold; position: relative; text-align: center; color: white; }
        .btn-c b { font-size: 28px; display: block; }
        .edit-pen { position: absolute; top: 5px; right: 5px; font-size: 14px; opacity: 0.7; }

        .estacion-card { background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .timer-display { font-family: monospace; font-size: 24px; color: var(--danger); font-weight: bold; }
        
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .defect-tag { background: #334155; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 4px; }
    </style>
</head>
<body onload="init()">

<nav>
    <button class="nav-btn active" onclick="showTab('inicio', this)">REGISTRO</button>
    <button class="nav-btn" onclick="showTab('calidad', this)">CALIDAD</button>
    <button class="nav-btn" onclick="showTab('final', this)">FINAL</button>
    <button class="nav-btn" onclick="showTab('eventos', this)">EVENTOS</button>
    <button class="nav-btn" onclick="showTab('resumen', this)">INFORME</button>
</nav>

<div class="container">
    <div id="tab-inicio" class="content">
        <div class="card">
            <label>FECHA DEL TURNO</label>
            <input type="date" id="fecha" onchange="g()">
            <label>EQUIPO / TURNO TRABAJO</label>
            <div style="display:flex; gap:10px;">
                <select id="equipo" onchange="g()"><option>T1</option><option>T2</option><option>T3</option></select>
                <select id="turno" onchange="g()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select>
            </div>
            <input type="text" id="of" placeholder="Nº Orden Fabricación" oninput="g()">
            <input type="text" id="sap" placeholder="Código SAP" oninput="g()">
            <input type="text" id="modelo" placeholder="UNDORA / Gráfica / Modelo" oninput="g()">
            <input type="text" id="formato" placeholder="Formato (Ej: 120x270)" oninput="g()">
        </div>
    </div>

    <div id="tab-calidad" class="content hidden">
        <div class="card">
            <label>CONTROL CALIDAD: ZONA CRUDO</label>
            <div class="grid-3">
                <button class="btn-c" style="background:var(--success)" onclick="add('c','ok')"><b id="c-ok">0</b>OK</button>
                <button class="btn-c" style="background:var(--warning); color:black" onclick="openDefect('c','r1')"><span class="edit-pen">✏️</span><b id="c-r1">0</b>R1</button>
                <button class="btn-c" style="background:var(--danger)" onclick="openDefect('c','ko')"><span class="edit-pen">✏️</span><b id="c-ko">0</b>KO</button>
            </div>
            <div id="c-defect-list" style="margin-top:10px; font-size:12px; color:#94a3b8;"></div>
        </div>
    </div>

    <div id="tab-final" class="content hidden">
        <div class="card">
            <label>CONTROL CALIDAD: ZONA FINAL (EMBALAJE)</label>
            <div class="grid-3">
                <button class="btn-c" style="background:var(--success)" onclick="add('f','ok')"><b id="f-ok">0</b>OK</button>
                <button class="btn-c" style="background:var(--warning); color:black" onclick="openDefect('f','r1')"><span class="edit-pen">✏️</span><b id="f-r1">0</b>R1</button>
                <button class="btn-c" style="background:var(--danger)" onclick="openDefect('f','ko')"><span class="edit-pen">✏️</span><b id="f-ko">0</b>KO</button>
            </div>
            <div id="f-defect-list" style="margin-top:10px; font-size:12px; color:#94a3b8;"></div>
        </div>
    </div>

    <div id="tab-eventos" class="content hidden">
        <div id="eventos-container"></div>
        <div class="card">
            <label>📝 AÑADIR DESDE LIBRETA (DIFERIDO)</label>
            <div style="display:flex; gap:5px;">
                <input type="time" id="dif-desde">
                <input type="time" id="dif-hasta">
            </div>
            <select id="dif-estacion">
                <option>KERAJET</option><option>SMALTEC</option><option>PRENSAS</option><option>SECADERO</option><option>MECÁNICO</option><option>OTROS</option>
            </select>
            <textarea id="dif-obs" placeholder="Explica qué ha pasado... (Usa el micro)"></textarea>
            <button class="btn-action" onclick="addDiferido()">GUARDAR EVENTO</button>
        </div>
    </div>

    <div id="tab-resumen" class="content hidden">
        <div class="card" id="resumen-final"></div>
        <button class="btn-action" style="background:#25d366; color:white;" onclick="enviarWA()">ENVIAR WHATSAPP</button>
        <button class="btn-action" style="background:#f44336; color:white;" onclick="exportarPDF()">DESCARGAR PDF</button>
    </div>
</div>

<script>
    const estaciones = ["KERAJET", "SMALTEC", "PRENSAS", "SECADERO", "MECÁNICO"];
    const defectTypes = ["Gotas", "Rayas", "Calibre", "Tono", "Limpieza", "Rotura", "Otros"];
    
    let db = { 
        fecha: new Date().toISOString().split('T')[0], turno:'Mañana', equipo:'T1', of:'', sap:'', modelo:'', formato:'',
        c:{ok:0, r1:0, ko:0, details:[]}, f:{ok:0, r1:0, ko:0, details:[]}, 
        paradas: {}, starts: {}, logs: [] 
    };

    function init() {
        const saved = localStorage.getItem('PROD_V51');
        if(saved) db = JSON.parse(saved);
        estaciones.forEach(est => { if(!db.paradas[est]) db.paradas[est] = 0; });
        renderEstaciones();
        render();
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'resumen') generarResumen();
    }

    function add(zona, tipo) { db[zona][tipo]++; r(); g(); }

    function openDefect(zona, tipo) {
        const motivo = prompt("Motivo del defecto (" + defectTypes.join(", ") + "):", "Gotas");
        const resp = prompt("Equipo responsable (T1, T2, T3):", db.equipo);
        const cant = prompt("¿Cuántas piezas?", "1");
        
        if(motivo && resp && cant) {
            db[zona][tipo] += parseInt(cant);
            db[zona].details.push({tipo: tipo.toUpperCase(), motivo: motivo, resp: resp, cant: parseInt(cant)});
            r(); g();
        }
    }

    function renderEstaciones() {
        const container = document.getElementById('eventos-container');
        container.innerHTML = estaciones.map(est => `
            <div class="estacion-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${est}</b>
                    <div class="timer-display" id="time-${est}">${fmtTime(db.paradas[est])}</div>
                    <button onclick="toggleT('${est}')" id="btn-${est}" style="background:var(--success); border:none; padding:10px; border-radius:8px; font-weight:bold;">PLAY</button>
                </div>
            </div>
        `).join('');
    }

    function toggleT(est) {
        const btn = document.getElementById('btn-'+est);
        if(!db.starts[est]) {
            db.starts[est] = Date.now();
            btn.innerText = "STOP"; btn.style.background = "var(--danger)";
        } else {
            let segs = Math.floor((Date.now() - db.starts[est]) / 1000);
            db.paradas[est] += segs;
            const obs = prompt("Motivo de la parada " + est + ":", "Limpieza/Ajuste");
            db.logs.push({h: new Date().toLocaleTimeString(), est: est, dur: Math.floor(segs/60), obs: obs || "Sin motivo"});
            db.starts[est] = null;
            btn.innerText = "PLAY"; btn.style.background = "var(--success)";
        }
        r(); g();
    }

    function addDiferido() {
        const d = document.getElementById('dif-desde').value;
        const h = document.getElementById('dif-hasta').value;
        const est = document.getElementById('dif-estacion').value;
        const obs = document.getElementById('dif-obs').value;
        if(!d || !h) return alert("Indica las horas");
        db.logs.push({h: d + " a " + h, est: est, dur: "Manual", obs: obs});
        alert("Evento guardado");
        g(); r();
    }

    function fmtTime(s) {
        return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function generarResumen() {
        let h = `<h3>INFORME: ${db.modelo}</h3>
        <p>OF: ${db.of} | SAP: ${db.sap} | Equipo: ${db.equipo}</p>
        <hr>
        <p><b>ZONA CRUDO:</b> OK: ${db.c.ok} | R1: ${db.c.r1} | KO: ${db.c.ko}</p>
        <p><b>ZONA FINAL:</b> OK: ${db.f.ok} | R1: ${db.f.r1} | KO: ${db.f.ko}</p>
        <hr>
        <p><b>PARADAS Y EVENTOS:</b></p>`;
        db.logs.forEach(l => h += `<p style="font-size:11px;">• [${l.h}] ${l.est}: ${l.obs}</p>`);
        document.getElementById('resumen-final').innerHTML = h;
    }

    function r() {
        document.getElementById('fecha').value = db.fecha;
        document.getElementById('of').value = db.of;
        document.getElementById('sap').value = db.sap;
        document.getElementById('modelo').value = db.modelo;
        document.getElementById('formato').value = db.formato;
        document.getElementById('equipo').value = db.equipo;
        document.getElementById('turno').value = db.turno;
        
        ['ok','r1','ko'].forEach(t => {
            document.getElementById('c-'+t).innerText = db.c[t];
            document.getElementById('f-'+t).innerText = db.f[t];
        });

        document.getElementById('c-defect-list').innerHTML = db.c.details.map(d => `<span class="defect-tag">${d.cant}x ${d.motivo} (${d.resp})</span>`).join('');
        document.getElementById('f-defect-list').innerHTML = db.f.details.map(d => `<span class="defect-tag">${d.cant}x ${d.motivo} (${d.resp})</span>`).join('');
        estaciones.forEach(est => document.getElementById('time-'+est).innerText = fmtTime(db.paradas[est]));
    }

    function g() {
        db.fecha = document.getElementById('fecha').value;
        db.of = document.getElementById('of').value;
        db.sap = document.getElementById('sap').value;
        db.modelo = document.getElementById('modelo').value;
        db.formato = document.getElementById('formato').value;
        db.equipo = document.getElementById('equipo').value;
        db.turno = document.getElementById('turno').value;
        localStorage.setItem('PROD_V51', JSON.stringify(db));
    }

    function enviarWA() {
        let t = `*INFORME PROD ${db.equipo}*%0AModelo: ${db.modelo}%0AOF: ${db.of}%0A%0A*CRUDO:* OK ${db.c.ok} R1 ${db.c.r1} KO ${db.c.ko}%0A*FINAL:* OK ${db.f.ok} R1 ${db.f.r1} KO ${db.f.ko}%0A%0A*PARADAS:* ${db.logs.length} registradas.`;
        window.open(`https://wa.me/?text=${t}`);
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16); doc.text("INFORME DE PRODUCCIÓN", 10, 20);
        doc.setFontSize(12); doc.text(`OF: ${db.of} | Modelo: ${db.modelo}`, 10, 30);
        doc.text(`Calidad Crudo: OK:${db.c.ok} R1:${db.c.r1} KO:${db.c.ko}`, 10, 45);
        doc.text(`Calidad Final: OK:${db.f.ok} R1:${db.f.r1} KO:${db.f.ko}`, 10, 55);
        doc.save(`Informe_${db.of}.pdf`);
    }
</script>
</body>
</html>
