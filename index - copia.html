<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROD V53 - FINAL STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --warning: #eab308; --danger: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 16px; color: var(--accent); }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 70px; }
        .nav-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 10px; font-weight: bold; color: var(--text); opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); border-top: 3px solid var(--accent); }

        .container { padding: 12px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        
        input, select, textarea { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; color: white; font-size: 16px; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-count { border: none; border-radius: 10px; padding: 15px 5px; font-weight: bold; text-align: center; color: white; }
        .btn-count b { font-size: 24px; display: block; }

        .photo-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin: 5px; border: 1px solid var(--accent); }
        .estacion-row { background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .timer { font-family: monospace; font-size: 20px; color: var(--danger); font-weight: bold; }
        
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body onload="init()">

<header><h1 id="header-title">DATOS DE PRODUCCIÓN</h1></header>

<div class="container">
    <div id="t-inicio" class="content">
        <div class="card">
            <label style="font-size:12px; color:#94a3b8">IDENTIFICACIÓN</label>
            <input type="date" id="fecha" onchange="g()">
            <div style="display:flex; gap:8px;">
                <select id="equipo" onchange="g()"><option>T1</option><option>T2</option><option>T3</option></select>
                <select id="turno" onchange="g()"><option>Mañana</option><option>Tarde</option><option>Noche</option></select>
            </div>
            <input type="text" id="of" placeholder="Nº Orden (OF)" oninput="g()">
            <input type="text" id="sap" placeholder="Código SAP" oninput="g()">
            <input type="text" id="modelo" placeholder="Modelo / Gráfica / UNDORA" oninput="g()">
        </div>
    </div>

    <div id="t-crudo" class="content hidden">
        <div class="card">
            <label style="font-size:12px; color:#94a3b8">CONTROL ZONA CRUDO</label>
            <div class="grid-3">
                <button class="btn-count" style="background:var(--success)" onclick="add('c','ok')"><b>OK</b><span id="c-ok">0</span></button>
                <button class="btn-count" style="background:var(--warning); color:black" onclick="addDef('c','r1')"><b>R1</b><span id="c-r1">0</span></button>
                <button class="btn-count" style="background:var(--danger)" onclick="addDef('c','ko')"><b>KO</b><span id="c-ko">0</span></button>
            </div>
            <div id="pics-c" style="display:flex; flex-wrap:wrap; margin-top:10px;"></div>
        </div>
    </div>

    <div id="t-final" class="content hidden">
        <div class="card">
            <label style="font-size:12px; color:#94a3b8">CONTROL ZONA FINAL</label>
            <div class="grid-3">
                <button class="btn-count" style="background:var(--success)" onclick="add('f','ok')"><b>OK</b><span id="f-ok">0</span></button>
                <button class="btn-count" style="background:var(--warning); color:black" onclick="addDef('f','r1')"><b>R1</b><span id="f-r1">0</span></button>
                <button class="btn-count" style="background:var(--danger)" onclick="addDef('f','ko')"><b>KO</b><span id="f-ko">0</span></button>
            </div>
            <div id="pics-f" style="display:flex; flex-wrap:wrap; margin-top:10px;"></div>
        </div>
    </div>

    <div id="t-paradas" class="content hidden">
        <div id="lista-estaciones"></div>
        <div class="card">
            <label>PARADA DIFERIDA (LIBRETA)</label>
            <div style="display:flex; gap:5px;">
                <input type="time" id="m-i"> <input type="time" id="m-f">
            </div>
            <textarea id="m-o" placeholder="Motivo de la parada..."></textarea>
            <button class="btn-action" onclick="saveManual()">REGISTRAR PARADA</button>
        </div>
    </div>

    <div id="t-resumen" class="content hidden">
        <div class="card" id="txt-resumen" style="font-size:13px;"></div>
        <button class="btn-action" style="background:#25d366; color:white;" onclick="enviarWA()">ENVIAR POR WHATSAPP</button>
        <button class="btn-action" style="background:#ef4444; color:white;" onclick="generarPDF()">DESCARGAR PDF CON FOTOS</button>
    </div>
</div>

<input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden" onchange="handlePhoto(event)">

<nav>
    <button class="nav-btn active" onclick="showT('inicio',this,'DATOS PRINCIPALES')">INICIO</button>
    <button class="nav-btn" onclick="showT('crudo',this,'CALIDAD CRUDO')">CRUDO</button>
    <button class="nav-btn" onclick="showT('final',this,'CALIDAD FINAL')">FINAL</button>
    <button class="nav-btn" onclick="showT('paradas',this,'REGISTRO PARADAS')">PARADAS</button>
    <button class="nav-btn" onclick="showT('resumen',this,'RESUMEN E INFORME')">INFORME</button>
</nav>

<script>
    const estaciones = ["KERAJET", "SMALTEC", "PRENSAS", "SECADERO", "OTROS"];
    let db = { 
        of:'', sap:'', modelo:'', equipo:'T1', turno:'Mañana',
        c:{ok:0, r1:0, ko:0, fotos:[]}, f:{ok:0, r1:0, ko:0, fotos:[]},
        paradas: {}, starts: {}, logs: [] 
    };
    let currentZona = ''; 

    function init() {
        const local = localStorage.getItem('BASILIO_V53');
        if(local) db = JSON.parse(local);
        estaciones.forEach(e => { if(!db.paradas[e]) db.paradas[e]=0; });
        renderEst();
        r();
    }

    function showT(id, btn, title) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('t-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('header-title').innerText = title;
        if(id === 'resumen') buildResumen();
    }

    function add(z, t) { db[z][t]++; r(); g(); }

    function addDef(zona, tipo) {
        currentZona = zona;
        const mot = prompt("Motivo del defecto:", "Gota/Raya");
        if(!mot) return;
        const cant = prompt("¿Cuántas piezas?", "1");
        if(!cant) return;

        db[zona][tipo] += parseInt(cant);
        if(confirm("¿Quieres adjuntar FOTO del defecto?")) {
            document.getElementById('camera-input').click();
        }
        r(); g();
    }

    function handlePhoto(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            db[currentZona].fotos.push(event.target.result); // Base64
            r(); g();
        };
        reader.readAsDataURL(file);
    }

    function renderEst() {
        const container = document.getElementById('lista-estaciones');
        container.innerHTML = estaciones.map(e => `
            <div class="estacion-row">
                <b>${e}</b>
                <div class="timer" id="tm-${e}">${fmt(db.paradas[e])}</div>
                <button onclick="toggle('${e}')" id="bt-${e}" style="background:var(--success); border:none; padding:10px; border-radius:8px; font-weight:bold; width:70px;">PLAY</button>
            </div>
        `).join('');
    }

    function toggle(e) {
        const btn = document.getElementById('bt-'+e);
        if(!db.starts[e]) {
            db.starts[e] = Date.now();
            btn.innerText = "STOP"; btn.style.background = "var(--danger)";
        } else {
            let s = Math.floor((Date.now() - db.starts[e])/1000);
            db.paradas[e] += s;
            const o = prompt("Motivo de parada "+e+":");
            db.logs.push({h: new Date().toLocaleTimeString(), e: e, dur: Math.floor(s/60), o: o || "S/M"});
            db.starts[e] = null;
            btn.innerText = "PLAY"; btn.style.background = "var(--success)";
        }
        r(); g();
    }

    function saveManual() {
        const i = document.getElementById('m-i').value, f = document.getElementById('m-f').value, o = document.getElementById('m-o').value;
        if(!i || !f) return alert("Falta horario");
        db.logs.push({h: i+" a "+f, e: "LIBRETA", dur: "-", o: o});
        r(); g(); alert("Guardado");
    }

    function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

    function r() {
        document.getElementById('of').value = db.of;
        document.getElementById('sap').value = db.sap;
        document.getElementById('modelo').value = db.modelo;
        ['ok','r1','ko'].forEach(t => {
            document.getElementById('c-'+t).innerText = db.c[t];
            document.getElementById('f-'+t).innerText = db.f[t];
        });
        document.getElementById('pics-c').innerHTML = db.c.fotos.map(f => `<img src="${f}" class="photo-preview">`).join('');
        document.getElementById('pics-f').innerHTML = db.f.fotos.map(f => `<img src="${f}" class="photo-preview">`).join('');
        estaciones.forEach(e => document.getElementById('tm-'+e).innerText = fmt(db.paradas[e]));
    }

    function g() {
        db.of = document.getElementById('of').value;
        db.sap = document.getElementById('sap').value;
        db.modelo = document.getElementById('modelo').value;
        db.equipo = document.getElementById('equipo').value;
        db.turno = document.getElementById('turno').value;
        localStorage.setItem('BASILIO_V53', JSON.stringify(db));
    }

    function buildResumen() {
        let h = `<b>RESUMEN TURNO: ${db.equipo}</b><br>OF: ${db.of} | SAP: ${db.sap}<br>Modelo: ${db.modelo}<hr>`;
        h += `<b>ZONA CRUDO:</b> OK ${db.c.ok} | R1 ${db.c.r1} | KO ${db.c.ko} | Fotos: ${db.c.fotos.length}<br>`;
        h += `<b>ZONA FINAL:</b> OK ${db.f.ok} | R1 ${db.f.r1} | KO ${db.f.ko} | Fotos: ${db.f.fotos.length}<hr>`;
        h += `<b>PARADAS:</b><br>`;
        db.logs.forEach(l => h += `- [${l.h}] ${l.e}: ${l.o}<br>`);
        document.getElementById('txt-resumen').innerHTML = h;
    }

    function enviarWA() {
        let t = `*INFORME PROD:* OF ${db.of}%0A*CRUDO:* OK ${db.c.ok} R1 ${db.c.r1}%0A*FINAL:* OK ${db.f.ok} R1 ${db.f.r1}%0A*PARADAS:* ${db.logs.length} registradas.`;
        window.open(`https://wa.me/?text=${t}`);
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 15;
        doc.setFontSize(16); doc.text("INFORME PRODUCCIÓN: " + db.of, 10, y); y += 10;
        doc.setFontSize(11); doc.text("SAP: " + db.sap + " | Modelo: " + db.modelo, 10, y); y += 15;
        
        doc.text("CALIDAD CRUDO: OK " + db.c.ok + " | R1 " + db.c.r1 + " | KO " + db.c.ko, 10, y); y += 10;
        db.c.fotos.forEach((f, i) => { if(y > 250) { doc.addPage(); y=20; } doc.addImage(f, 'JPEG', 10, y, 40, 40); y += 45; });

        if(y > 230) { doc.addPage(); y=20; }
        doc.text("CALIDAD FINAL: OK " + db.f.ok + " | R1 " + db.f.r1 + " | KO " + db.f.ko, 10, y); y += 10;
        db.f.fotos.forEach((f, i) => { if(y > 250) { doc.addPage(); y=20; } doc.addImage(f, 'JPEG', 10, y, 40, 40); y += 45; });

        doc.save(`Informe_${db.of}.pdf`);
    }
</script>
</body>
</html>
