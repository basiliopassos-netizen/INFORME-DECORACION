<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decoline V30</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #1a237e; --green: #2e7d32; --red: #c62828; --orange: #ef6c00; --gray: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); padding-bottom: 80px; }
        .nav { display: flex; background: white; position: sticky; top: 0; z-index: 1000; height: 65px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { flex: 1; border: none; background: #eee; font-weight: bold; font-size: 11px; color: #777; border-right: 1px solid #ccc; }
        .nav-btn.active { color: white; background: var(--blue); }
        .sect { display: none; padding: 15px; }
        .sect.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        h3 { margin: 0 0 10px 0; color: var(--blue); font-size: 16px; border-left: 4px solid var(--blue); padding-left: 8px; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 13px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .grid-semaforo { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-sem { padding: 15px 5px; border-radius: 12px; border: 2px solid; background: white; font-weight: bold; text-align: center; }
        .btn-ok { border-color: var(--green); color: var(--green); }
        .btn-r1 { border-color: var(--orange); color: var(--orange); cursor:pointer; }
        .btn-no { border-color: var(--red); color: var(--red); cursor:pointer; }
        .val-n { font-size: 22px; display: block; margin-top: 5px; }
        .btn-main { background: var(--green); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor:pointer; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; }
        .modal-content { background:white; width:90%; border-radius:20px; padding:20px; text-align:center; max-height: 80vh; overflow-y: auto; }
        .btn-def { background: #f0f0f0; border: 1px solid #ccc; padding: 15px; width: 100%; margin-bottom: 8px; border-radius: 10px; font-weight: bold; }
        .item-res { border-bottom: 1px solid #ddd; padding: 10px 0; position: relative; }
        .btn-del-res { position: absolute; right: 0; top: 10px; color: var(--red); font-weight: bold; border: none; background: none; font-size: 18px; }
    </style>
</head>
<body>

<div class="nav">
    <button class="nav-btn active" onclick="setTab(0)">REGISTRO</button>
    <button class="nav-btn" onclick="setTab(1)">PRODUCCIÓN</button>
    <button class="nav-btn" onclick="setTab(2)">PARADAS</button>
    <button class="nav-btn" onclick="setTab(3)">RESUMEN</button>
</div>

<div id="tab0" class="sect" style="display:block;">
    <div class="card">
        <h3>REGISTRO DE TURNO</h3>
        <label>FECHA</label><input type="date" id="f-fecha" onchange="sync()">
        <label>Nº ORDEN (OF)</label><input type="number" id="f-of" oninput="sync()">
        <label>CÓDIGO SAP</label><input type="number" id="f-sap" oninput="sync()">
        <label>GRÁFICA</label><input type="text" id="f-grafica" oninput="sync()">
        <label>SUSTRATO</label><input type="text" id="f-sustrato" oninput="sync()">
        <label>TURNO</label>
        <select id="f-turno" onchange="sync()">
            <option>MAÑANA</option><option>TARDE</option><option>NOCHE</option>
        </select>
        <label>EQUIPO DE TRABAJO</label>
        <select id="f-equipo" onchange="sync()">
            <option>T1</option><option>T2</option><option>T3</option>
        </select>
    </div>
</div>

<div id="tab1" class="sect">
    <div class="card">
        <h3>ZONA CALIDAD</h3>
        <div class="grid-semaforo">
            <div class="btn-sem btn-ok">OK<span class="val-n" id="v-cal-ok-txt">0</span></div>
            <div class="btn-sem btn-r1" onclick="openDef('calidad','r1')">R1<span class="val-n" id="v-cal-r1">0</span></div>
            <div class="btn-sem btn-no" onclick="openDef('calidad','noko')">NO OK<span class="val-n" id="v-cal-noko">0</span></div>
        </div>
        <input type="number" id="in-cal-ok" placeholder="Escribir piezas OK" style="border:2px solid var(--green); margin-top:15px; text-align:center;" oninput="db.prod.calidad.ok=this.value; sync();">
    </div>
    <div class="card">
        <h3>ZONA EMBALAJE</h3>
        <div class="grid-semaforo">
            <div class="btn-sem btn-ok">OK<span class="val-n" id="v-emb-ok-txt">0</span></div>
            <div class="btn-sem btn-r1" onclick="openDef('embalaje','r1')">R1<span class="val-n" id="v-emb-r1">0</span></div>
            <div class="btn-sem btn-no" onclick="openDef('embalaje','noko')">NO OK<span class="val-n" id="v-emb-noko">0</span></div>
        </div>
        <input type="number" id="in-emb-ok" placeholder="Escribir piezas OK" style="border:2px solid var(--green); margin-top:15px; text-align:center;" oninput="db.prod.embalaje.ok=this.value; sync();">
    </div>
</div>

<div id="tab2" class="sect">
    <div class="card">
        <h3>REGISTRAR PARADA</h3>
        <label>ESTACIÓN</label>
        <select id="p-est">
            <option>LGV</option><option>BARBIERI</option><option>ROBOTIONS</option><option>CEPILLADORA</option><option>CABINA 1</option><option>HORNOS</option><option>ERRECE</option><option>KERAJET</option><option>UV</option><option>EMBALAJE</option>
        </select>
        <div style="display:flex; gap:10px;"><input type="time" id="p-h1"><input type="time" id="p-h2"></div>
        <textarea id="p-obs" placeholder="Motivo o comentario..."></textarea>
        <button class="btn-main" onclick="addP()">GUARDAR PARADA</button>
    </div>
</div>

<div id="tab3" class="sect">
    <div class="card" id="res-header"></div>
    <div class="card" id="res-calidad"></div>
    <div class="card" id="res-embalaje"></div>
    <div class="card">
        <h3 style="color:var(--red)">PARADAS Y EVENTOS</h3>
        <div id="res-paradas"></div>
    </div>
    <button class="btn-main" style="background:var(--blue)" onclick="generarPDF()">📄 GENERAR INFORME DETALLADO</button>
    <button class="btn-main" style="background:red; margin-top:20px" onclick="if(confirm('¿Reiniciar turno?')){localStorage.clear(); location.reload();}">⚠️ REINICIAR</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="m-title">Defecto</h3>
        <div id="m-ops"></div>
        <button class="btn-main" style="background:#888" onclick="document.getElementById('modal').style.display='none'">CANCELAR</button>
    </div>
</div>

<script>
    var db = JSON.parse(localStorage.getItem('tanque_v30')) || {
        reg: { fecha: new Date().toISOString().split('T')[0], of:'', sap:'', grafica:'', sustrato:'', turno:'MAÑANA', equipo:'T1' },
        prod: { calidad: {ok:0, r1:0, noko:0, detalles:[]}, embalaje: {ok:0, r1:0, noko:0, detalles:[]} },
        paradas: []
    };

    var DEFS = {
        calidad: ["ROTA", "MALLA SUELTA", "BULTOS TRASERA", "PLAYA", "SUCIA", "DIMENSIONES"],
        embalaje: ["MAL PINTADA", "ROTA", "GOTA KERAJET", "RASCADA", "FALLO IMPRESIÓN", "DIFERENCIA DE TONO"]
    };

    function setTab(n) {
        var sections = document.getElementsByClassName('sect');
        for (var i = 0; i < sections.length; i++) { sections[i].style.display = 'none'; }
        var buttons = document.getElementsByClassName('nav-btn');
        for (var i = 0; i < buttons.length; i++) { buttons[i].className = 'nav-btn'; }
        document.getElementById('tab' + n).style.display = 'block';
        buttons[n].className = 'nav-btn active';
        if(n === 3) renderResumen();
    }

    function sync() {
        db.reg.of = document.getElementById('f-of').value;
        db.reg.sap = document.getElementById('f-sap').value;
        db.reg.grafica = document.getElementById('f-grafica').value;
        db.reg.sustrato = document.getElementById('f-sustrato').value;
        db.reg.fecha = document.getElementById('f-fecha').value;
        db.reg.turno = document.getElementById('f-turno').value;
        db.reg.equipo = document.getElementById('f-equipo').value;
        localStorage.setItem('tanque_v30', JSON.stringify(db));
        document.getElementById('v-cal-ok-txt').innerText = db.prod.calidad.ok || 0;
        document.getElementById('v-cal-r1').innerText = db.prod.calidad.r1;
        document.getElementById('v-cal-noko').innerText = db.prod.calidad.noko;
        document.getElementById('v-emb-ok-txt').innerText = db.prod.embalaje.ok || 0;
        document.getElementById('v-emb-r1').innerText = db.prod.embalaje.r1;
        document.getElementById('v-emb-noko').innerText = db.prod.embalaje.noko;
    }

    function openDef(zona, tipo) {
        var m = document.getElementById('modal');
        var ops = document.getElementById('m-ops');
        document.getElementById('m-title').innerText = "DEFECTO " + zona.toUpperCase();
        ops.innerHTML = '';
        DEFS[zona].forEach(function(d) {
            var b = document.createElement('button');
            b.className = 'btn-def';
            b.innerText = d;
            b.onclick = function() {
                db.prod[zona][tipo]++;
                db.prod[zona].detalles.push({ def: d, tipo: (tipo === 'noko' ? 'NO OK' : 'R1'), zona: zona.toUpperCase() });
                sync();
                m.style.display = 'none';
            };
            ops.appendChild(b);
        });
        m.style.display = 'flex';
    }

    function addP() {
        var est = document.getElementById('p-est').value;
        var h1 = document.getElementById('p-h1').value;
        var h2 = document.getElementById('p-h2').value;
        var obs = document.getElementById('p-obs').value;
        if(!h1 || !h2) return alert("Horas!");
        var t1 = h1.split(':'); var t2 = h2.split(':');
        var min = (parseInt(t2[0])*60 + parseInt(t2[1])) - (parseInt(t1[0])*60 + parseInt(t1[1]));
        db.paradas.push({est:est, h1:h1, h2:h2, min:min, obs:obs.toUpperCase()});
        document.getElementById('p-obs').value = '';
        sync(); alert("Guardado");
    }

    function renderResumen() {
        document.getElementById('res-header').innerHTML = `<h3>OF: ${db.reg.of || '---'}</h3><p>SUSTRATO: ${db.reg.sustrato} | EQUIPO: ${db.reg.equipo}</p>`;
        ['calidad', 'embalaje'].forEach(function(zona) {
            var z = db.prod[zona];
            document.getElementById('res-' + zona).innerHTML = `<h3>${zona.toUpperCase()}</h3><p>OK: ${z.ok} | R1: ${z.r1} | NO OK: ${z.noko}</p>` + 
                z.detalles.map(function(d, i) {
                    return `<div class="item-res">• ${d.def} (${d.tipo}) <button class="btn-del-res" onclick="delDef('${zona}', ${i})">X</button></div>`;
                }).join('');
        });
        var pDiv = document.getElementById('res-paradas');
        pDiv.innerHTML = '';
        db.paradas.forEach(function(p, i) {
            pDiv.innerHTML += `<div class="item-res"><b>${p.est}</b> (${p.min} min) <button class="btn-del-res" onclick="delP(${i})">X</button></div>`;
        });
    }

    function delDef(zona, i) {
        var fallo = db.prod[zona].detalles[i];
        if(fallo.tipo === "R1") db.prod[zona].r1--; else db.prod[zona].noko--;
        db.prod[zona].detalles.splice(i, 1);
        sync(); renderResumen();
    }

    function delP(i) { db.paradas.splice(i,1); sync(); renderResumen(); }

    async function generarPDF() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        doc.setFillColor(26, 35, 126); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("INFORME DE PRODUCCIÓN DECOLINE", 20, 25);
        doc.setTextColor(0, 0, 0); doc.setFontSize(11);
        doc.text(`OF: ${db.reg.of} | SAP: ${db.reg.sap} | FECHA: ${db.reg.fecha}`, 20, 50);
        doc.text(`SUSTRATO: ${db.reg.sustrato} | TURNO: ${db.reg.turno} | EQUIPO: ${db.reg.equipo}`, 20, 58);
        doc.text(`GRÁFICA: ${db.reg.grafica}`, 20, 66);
        doc.autoTable({
            startY: 72,
            head: [['ZONA', 'OK (Piezas)', 'R1 (Recuperables)', 'NO OK (Rechazo)']],
            body: [['CALIDAD', db.prod.calidad.ok, db.prod.calidad.r1, db.prod.calidad.noko],['EMBALAJE', db.prod.embalaje.ok, db.prod.embalaje.r1, db.prod.embalaje.noko]],
            headStyles: { fillColor: [26, 35, 126] }
        });
        var fallosBody = db.prod.calidad.detalles.concat(db.prod.embalaje.detalles).map(d => [d.zona, d.def, d.tipo]);
        if(fallosBody.length > 0) {
            doc.text("RESUMEN DE DEFECTOS REGISTRADOS", 20, doc.lastAutoTable.finalY + 15);
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 20, head: [['ZONA', 'DEFECTO', 'TIPO']], body: fallosBody, headStyles: { fillColor: [239, 108, 0] } });
        }
        if(db.paradas.length > 0) {
            doc.text("PARADAS Y TIEMPOS MUERTOS", 20, doc.lastAutoTable.finalY + 15);
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 20, head: [['ESTACIÓN', 'TIEMPO', 'MINUTOS', 'MOTIVO']], body: db.paradas.map(p => [p.est, `${p.h1} a ${p.h2}`, p.min, p.obs]), headStyles: { fillColor: [198, 40, 40] } });
        }
        doc.save(`Informe_Decoline_OF_${db.reg.of}.pdf`);
    }

    window.onload = function() {
        document.getElementById('f-of').value = db.reg.of;
        document.getElementById('f-sap').value = db.reg.sap;
        document.getElementById('f-grafica').value = db.reg.grafica;
        document.getElementById('f-sustrato').value = db.reg.sustrato;
        document.getElementById('f-fecha').value = db.reg.fecha;
        document.getElementById('f-turno').value = db.reg.turno;
        document.getElementById('f-equipo').value = db.reg.equipo;
        document.getElementById('in-cal-ok').value = db.prod.calidad.ok || '';
        document.getElementById('in-emb-ok').value = db.prod.embalaje.ok || '';
        sync();
    };
</script>
</body>
</html>
